<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Chart - Natal Chart Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #f5f3f0;
    color: #3d3a36;
    font-size: 13px;
    line-height: 1.5;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 0;
    background: #fff;
    border-bottom: 1px solid #e8e4df;
    padding: 0 16px;
    height: 44px;
    flex-wrap: wrap;
  }

  .toolbar .brand {
    font-size: 15px;
    font-weight: 600;
    color: #5a4e3c;
    margin-right: 20px;
    white-space: nowrap;
  }

  .toolbar .brand span { font-weight: 400; color: #a09788; }

  .toolbar form {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }

  .toolbar .sep {
    width: 1px;
    height: 22px;
    background: #e8e4df;
    margin: 0 4px;
    flex-shrink: 0;
  }

  .toolbar label {
    font-size: 11px;
    color: #9b9185;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .toolbar input,
  .toolbar select {
    padding: 4px 8px;
    border: 1px solid #ddd8d1;
    border-radius: 3px;
    background: #fcfbf9;
    color: #3d3a36;
    font-size: 12px;
    font-family: inherit;
    min-width: 0;
  }

  .toolbar input:focus,
  .toolbar select:focus {
    outline: none;
    border-color: #b09e82;
  }

  .toolbar input[type="date"] { width: 130px; }
  .toolbar input[type="time"] { width: 90px; }
  .toolbar input[type="text"] { width: 160px; }
  .toolbar select { width: 90px; }

  .btn-calc {
    padding: 5px 16px;
    border: none;
    border-radius: 3px;
    background: #8b7355;
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-calc:hover { background: #7a644a; }
  .btn-calc:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-bar {
    background: #fdf2f2;
    border-bottom: 1px solid #e8c4c4;
    color: #9b4d4d;
    padding: 6px 16px;
    font-size: 12px;
    display: none;
  }

  .meta-bar {
    display: flex;
    gap: 18px;
    padding: 6px 16px;
    background: #faf8f5;
    border-bottom: 1px solid #e8e4df;
  }

  .meta-item { font-size: 11px; color: #9b9185; }
  .meta-item b { color: #5a4e3c; font-weight: 500; }

  .content {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 44px);
    overflow: hidden;
  }

  .tabs-bar {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #e8e4df;
    padding: 0 16px;
    flex-shrink: 0;
  }

  .tab-btn {
    padding: 9px 18px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #9b9185;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
  }

  .tab-btn:hover { color: #5a4e3c; }
  .tab-btn.active { color: #5a4e3c; border-bottom-color: #8b7355; }

  .panel { display: none; flex: 1; overflow: auto; }
  .panel.active { display: block; }

  .tbl-section {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #9b9185;
    padding: 10px 16px 4px;
  }

  .tbl-section .n {
    background: #ece7df;
    padding: 0 6px;
    border-radius: 8px;
    font-size: 10px;
    margin-left: 4px;
    color: #8a8279;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    background: #fff;
  }

  th {
    text-align: left;
    padding: 7px 14px;
    background: #faf8f5;
    border-bottom: 2px solid #e8e4df;
    color: #8a8279;
    font-weight: 600;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  th:hover { color: #5a4e3c; }
  th.sorted-asc::after { content: ' \25B4'; }
  th.sorted-desc::after { content: ' \25BE'; }

  td {
    padding: 6px 14px;
    border-bottom: 1px solid #f0ece7;
    white-space: nowrap;
  }

  tr:nth-child(even) td { background: #fdfcfa; }
  tr:hover td { background: #f5f0ea; }

  td.num {
    text-align: right;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 11px;
    color: #6b6358;
  }

  .viz-panel { padding: 12px 16px; }

  #wheel-container iframe {
    width: 100%;
    height: calc(100vh - 140px);
    border: 1px solid #e8e4df;
    border-radius: 4px;
  }

  #wordcloud-container { text-align: center; }
  #wordcloud-container img { max-width: 100%; border-radius: 4px; border: 1px solid #e8e4df; }

  .note { color: #9b9185; font-size: 11px; margin-top: 6px; }

  .empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #c4bdb4;
    font-size: 14px;
  }

  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: #9b9185;
  }

  .loading::before {
    content: '';
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #e8e4df;
    border-top-color: #8b7355;
    border-radius: 50%;
    animation: sp 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes sp { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .toolbar { height: auto; padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
    .toolbar form { flex-wrap: wrap; }
    .toolbar .sep { display: none; }
    .toolbar input[type="date"],
    .toolbar input[type="time"],
    .toolbar input[type="text"],
    .toolbar select { width: 100%; }
    .content { height: auto; min-height: calc(100vh - 80px); }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="brand">Astro<span>Chart</span></div>
  <form id="chart-form">
    <label>Date</label>
    <input type="date" id="birth-date" required>
    <div class="sep"></div>
    <label>Time</label>
    <input type="time" id="birth-time" step="60" required>
    <div class="sep"></div>
    <label>Place</label>
    <input type="text" id="location" placeholder="City, Country" required>
    <div class="sep"></div>
    <label>System</label>
    <select id="zodiac">
      <option value="Tropical">Tropical</option>
      <option value="Sidereal">Sidereal</option>
    </select>
    <button type="submit" class="btn-calc" id="submit-btn">Calculate</button>
  </form>
</div>

<div id="error-bar" class="error-bar"></div>

<div class="content">
  <div class="loading" id="spinner">Calculating chart...</div>

  <div id="empty-state" class="empty">Enter birth details above to generate your natal chart</div>

  <div id="results" style="display:none;">
    <div id="meta-bar" class="meta-bar"></div>

    <div class="tabs-bar">
      <button class="tab-btn active" data-t="planets">Planets</button>
      <button class="tab-btn" data-t="houses">Houses</button>
      <button class="tab-btn" data-t="aspects">Aspects</button>
      <button class="tab-btn" data-t="wheel">Chart Wheel</button>
      <button class="tab-btn" data-t="traits">Traits</button>
    </div>

    <div id="p-planets" class="panel active">
      <div class="tbl-section">Planetary Positions<span class="n" id="planet-n"></span></div>
      <table id="planet-tbl"><thead><tr></tr></thead><tbody></tbody></table>
    </div>

    <div id="p-houses" class="panel">
      <div class="tbl-section">House Cusps &amp; Angles<span class="n" id="house-n"></span></div>
      <table id="house-tbl"><thead><tr></tr></thead><tbody></tbody></table>
    </div>

    <div id="p-aspects" class="panel">
      <div class="tbl-section">Aspects<span class="n" id="aspect-n"></span></div>
      <table id="aspect-tbl"><thead><tr></tr></thead><tbody></tbody></table>
    </div>

    <div id="p-wheel" class="panel viz-panel">
      <div id="wheel-container"></div>
    </div>

    <div id="p-traits" class="panel viz-panel">
      <div id="wordcloud-container"></div>
    </div>
  </div>
</div>

<script>
(function () {
  var form = document.getElementById('chart-form');
  var spinner = document.getElementById('spinner');
  var results = document.getElementById('results');
  var empty = document.getElementById('empty-state');
  var errBar = document.getElementById('error-bar');
  var btn = document.getElementById('submit-btn');

  function payload() {
    return {
      birth_datetime: document.getElementById('birth-date').value + 'T' + document.getElementById('birth-time').value + ':00',
      location: document.getElementById('location').value.trim(),
      zodiac_system: document.getElementById('zodiac').value,
    };
  }

  function err(m) { errBar.textContent = m; errBar.style.display = 'block'; }
  function clr() { errBar.style.display = 'none'; }

  document.querySelectorAll('.tab-btn').forEach(function (t) {
    t.addEventListener('click', function () {
      document.querySelectorAll('.tab-btn').forEach(function (x) { x.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function (x) { x.classList.remove('active'); });
      t.classList.add('active');
      document.getElementById('p-' + t.dataset.t).classList.add('active');
    });
  });

  function meta(d) {
    document.getElementById('meta-bar').innerHTML = [
      ['Location', d.location], ['Timezone', d.moment.timezone],
      ['System', d.zodiac_system],
      ['Coordinates', d.moment.latitude.toFixed(4) + ', ' + d.moment.longitude.toFixed(4)],
    ].map(function (x) { return '<div class="meta-item">' + x[0] + ': <b>' + x[1] + '</b></div>'; }).join('');
  }

  var ss = {};

  function tbl(id, rows, cid) {
    var t = document.getElementById(id);
    if (cid) document.getElementById(cid).textContent = rows ? rows.length : 0;
    if (!rows || !rows.length) { t.innerHTML = '<tbody><tr><td style="color:#c4bdb4;padding:16px">No data</td></tr></tbody>'; return; }
    var k = Object.keys(rows[0]);
    t.innerHTML = '<thead><tr>' + k.map(function (c) { return '<th data-c="' + c + '">' + c + '</th>'; }).join('') + '</tr></thead><tbody>' +
      rows.map(function (r) {
        return '<tr>' + k.map(function (c) {
          var v = r[c];
          if (v == null) return '<td class="num">\u2014</td>';
          if (typeof v === 'number') return '<td class="num">' + (Number.isInteger(v) ? v : v.toFixed(4)) + '</td>';
          return '<td>' + v + '</td>';
        }).join('') + '</tr>';
      }).join('') + '</tbody>';
    t.querySelectorAll('th').forEach(function (h) {
      h.addEventListener('click', function () {
        var c = h.dataset.c, ky = id + c;
        var d = ss[ky] === 'asc' ? 'desc' : 'asc'; ss[ky] = d;
        var s = rows.slice().sort(function (a, b) {
          var x = a[c], y = b[c];
          if (x == null) return 1; if (y == null) return -1;
          if (typeof x === 'number') return d === 'asc' ? x - y : y - x;
          return d === 'asc' ? String(x).localeCompare(String(y)) : String(y).localeCompare(String(x));
        });
        tbl(id, s, cid);
        var nh = t.querySelector('th[data-c="' + c + '"]');
        if (nh) nh.classList.add(d === 'asc' ? 'sorted-asc' : 'sorted-desc');
      });
    });
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault(); clr();
    results.style.display = 'none'; empty.style.display = 'none';
    spinner.style.display = 'block'; btn.disabled = true;

    var p = payload(), h = { 'Content-Type': 'application/json' }, b = JSON.stringify(p);

    Promise.allSettled([
      fetch('/chart', { method: 'POST', headers: h, body: b }),
      fetch('/chart/wheel', { method: 'POST', headers: h, body: b }),
      fetch('/chart/wordcloud', { method: 'POST', headers: h, body: b }),
    ]).then(function (r) {
      spinner.style.display = 'none'; btn.disabled = false;

      if (r[0].status === 'rejected' || !r[0].value.ok) {
        (r[0].status === 'rejected' ? Promise.resolve('Network error') : r[0].value.json().then(function (d) { return d.detail || 'Failed'; }))
          .then(function (m) { err(m); empty.style.display = 'flex'; });
        return;
      }

      r[0].value.json().then(function (d) {
        meta(d);
        var planets = d.bodies.filter(function (x) { return x.Body && x.Body.indexOf('House') === -1 && x.Body !== 'Asc' && x.Body !== 'MC' && x.Body !== 'Desc' && x.Body !== 'IC'; });
        var houses = d.bodies.filter(function (x) { return x.Body && (x.Body.indexOf('House') !== -1 || x.Body === 'Asc' || x.Body === 'MC' || x.Body === 'Desc' || x.Body === 'IC'); });
        tbl('planet-tbl', planets, 'planet-n');
        tbl('house-tbl', houses, 'house-n');
        tbl('aspect-tbl', d.aspects, 'aspect-n');
        results.style.display = '';
        document.querySelectorAll('.tab-btn').forEach(function (x) { x.classList.remove('active'); });
        document.querySelectorAll('.panel').forEach(function (x) { x.classList.remove('active'); });
        document.querySelector('[data-t="planets"]').classList.add('active');
        document.getElementById('p-planets').classList.add('active');
      });

      var wc = document.getElementById('wheel-container');
      if (r[1].status === 'fulfilled' && r[1].value.ok) {
        r[1].value.text().then(function (html) {
          wc.innerHTML = '';
          var f = document.createElement('iframe');
          f.setAttribute('sandbox', 'allow-scripts');
          wc.appendChild(f);
          f.contentDocument.open(); f.contentDocument.write(html); f.contentDocument.close();
        });
      } else { wc.innerHTML = '<div class="empty">Chart wheel unavailable</div>'; }

      var cc = document.getElementById('wordcloud-container');
      if (r[2].status === 'fulfilled' && r[2].value.ok) {
        r[2].value.blob().then(function (bl) {
          cc.innerHTML = '<img src="' + URL.createObjectURL(bl) + '" alt="Traits"><p class="note">Strengths and stress indicators based on planetary placements</p>';
        });
      } else { cc.innerHTML = '<div class="empty">Trait analysis unavailable</div>'; }
    });
  });
})();
</script>
</body>
</html>
