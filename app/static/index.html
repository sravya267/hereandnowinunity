<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Chart - Natal Chart Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #f5f3f0;
    color: #3d3a36;
    font-size: 13px;
    line-height: 1.5;
  }

  a { color: #8b7355; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .header {
    background: #fff;
    border-bottom: 1px solid #e8e4df;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 400;
    color: #5a4e3c;
    letter-spacing: 0.02em;
  }

  .header h1 span { font-weight: 600; }

  .header .sep { color: #d4cfc8; font-size: 18px; font-weight: 200; }

  .header .nav {
    font-size: 12px;
    color: #9b9185;
    letter-spacing: 0.02em;
  }

  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  .form-card {
    background: #fff;
    border: 1px solid #e8e4df;
    border-radius: 6px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }

  .form-card h2 {
    font-size: 14px;
    font-weight: 600;
    color: #5a4e3c;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #f0ece7;
  }

  .form-row {
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .form-field { flex: 1; min-width: 150px; }

  .form-field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: #8a8279;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .form-field input,
  .form-field select {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid #ddd8d1;
    border-radius: 4px;
    background: #fcfbf9;
    color: #3d3a36;
    font-size: 13px;
    font-family: inherit;
    transition: border-color 0.15s;
  }

  .form-field input:focus,
  .form-field select:focus {
    outline: none;
    border-color: #b09e82;
    background: #fff;
  }

  .btn-submit {
    padding: 7px 28px;
    border: 1px solid #a08c6e;
    border-radius: 4px;
    background: linear-gradient(to bottom, #c4b49a, #b09e82);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    background: #fdf2f2;
    border: 1px solid #e8c4c4;
    color: #9b4d4d;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    margin-top: 12px;
    display: none;
  }

  .results-card {
    background: #fff;
    border: 1px solid #e8e4df;
    border-radius: 6px;
    overflow: hidden;
  }

  .result-tabs {
    display: flex;
    background: #faf8f5;
    border-bottom: 1px solid #e8e4df;
    padding: 0;
  }

  .result-tab {
    padding: 10px 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #9b9185;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: color 0.15s;
  }

  .result-tab:hover { color: #5a4e3c; }

  .result-tab.active {
    color: #5a4e3c;
    border-bottom-color: #b09e82;
    background: #fff;
  }

  .meta-bar {
    display: flex;
    gap: 20px;
    padding: 10px 20px;
    background: #faf8f5;
    border-bottom: 1px solid #f0ece7;
    flex-wrap: wrap;
  }

  .meta-item { font-size: 12px; color: #8a8279; }
  .meta-item b { color: #5a4e3c; font-weight: 500; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .table-wrap { padding: 0; overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }

  th {
    text-align: left;
    padding: 8px 14px;
    background: #faf8f5;
    border-bottom: 2px solid #e8e4df;
    color: #8a8279;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  th:hover { color: #5a4e3c; }
  th.sorted-asc::after { content: ' \25B4'; }
  th.sorted-desc::after { content: ' \25BE'; }

  td {
    padding: 7px 14px;
    border-bottom: 1px solid #f0ece7;
    white-space: nowrap;
  }

  tr:nth-child(even) td { background: #fdfcfa; }
  tr:hover td { background: #f5f0ea; }

  td.num {
    text-align: right;
    font-family: 'Menlo', 'Consolas', 'SF Mono', monospace;
    font-size: 11.5px;
    color: #6b6358;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #8a8279;
    padding: 14px 14px 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .badge {
    background: #ece7df;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
    color: #8a8279;
  }

  .chart-panel { padding: 16px; }

  #wheel-container iframe {
    width: 100%;
    height: 560px;
    border: 1px solid #e8e4df;
    border-radius: 4px;
  }

  #wordcloud-container { text-align: center; padding: 20px; }
  #wordcloud-container img { max-width: 100%; border-radius: 4px; border: 1px solid #e8e4df; }

  .wc-note { color: #9b9185; font-size: 11px; margin-top: 8px; }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: #c4bdb4;
    font-size: 14px;
  }

  .spinner {
    display: none;
    text-align: center;
    padding: 50px;
    color: #9b9185;
    font-size: 13px;
  }

  .spinner::before {
    content: '';
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid #e8e4df;
    border-top-color: #b09e82;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .form-row { flex-direction: column; gap: 10px; }
    .form-field { min-width: 100%; }
    .main { padding: 12px; }
    .meta-bar { gap: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>Astro</span> Chart</h1>
  <span class="sep">|</span>
  <span class="nav">Free Natal Chart Calculator</span>
</div>

<div class="main">
  <div class="form-card">
    <h2>Birth Data</h2>
    <form id="chart-form">
      <div class="form-row">
        <div class="form-field">
          <label for="birth-date">Date of Birth</label>
          <input type="date" id="birth-date" required>
        </div>
        <div class="form-field">
          <label for="birth-time">Time of Birth</label>
          <input type="time" id="birth-time" step="60" required>
        </div>
        <div class="form-field">
          <label for="location">Place of Birth</label>
          <input type="text" id="location" placeholder="e.g. New Delhi, India" required>
        </div>
        <div class="form-field" style="max-width:160px;">
          <label for="zodiac">System</label>
          <select id="zodiac">
            <option value="Tropical">Tropical</option>
            <option value="Sidereal">Sidereal</option>
          </select>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Calculate</button>
      </div>
      <div id="error-box" class="error-msg"></div>
    </form>
  </div>

  <div class="spinner" id="spinner">Calculating chart...</div>

  <div id="empty-state" class="empty-state" style="display:none;"></div>

  <div id="results" style="display:none;">
    <div class="results-card">
      <div id="meta-bar" class="meta-bar"></div>

      <div class="result-tabs">
        <button class="result-tab active" data-tab="positions">Planets</button>
        <button class="result-tab" data-tab="aspects">Aspects</button>
        <button class="result-tab" data-tab="wheel">Chart Wheel</button>
        <button class="result-tab" data-tab="wordcloud">Traits</button>
      </div>

      <div id="tab-positions" class="tab-panel active">
        <div class="section-label">Planetary Positions <span class="badge" id="body-count"></span></div>
        <div class="table-wrap">
          <table id="bodies-table"><thead><tr></tr></thead><tbody></tbody></table>
        </div>
      </div>

      <div id="tab-aspects" class="tab-panel">
        <div class="section-label">Aspects <span class="badge" id="aspect-count"></span></div>
        <div class="table-wrap">
          <table id="aspects-table"><thead><tr></tr></thead><tbody></tbody></table>
        </div>
      </div>

      <div id="tab-wheel" class="tab-panel chart-panel">
        <div id="wheel-container"></div>
      </div>

      <div id="tab-wordcloud" class="tab-panel chart-panel">
        <div id="wordcloud-container"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var form = document.getElementById('chart-form');
  var spinner = document.getElementById('spinner');
  var results = document.getElementById('results');
  var emptyState = document.getElementById('empty-state');
  var errorBox = document.getElementById('error-box');
  var submitBtn = document.getElementById('submit-btn');

  function payload() {
    return {
      birth_datetime: document.getElementById('birth-date').value + 'T' + document.getElementById('birth-time').value + ':00',
      location: document.getElementById('location').value.trim(),
      zodiac_system: document.getElementById('zodiac').value,
    };
  }

  function showErr(m) { errorBox.textContent = m; errorBox.style.display = 'block'; }
  function hideErr() { errorBox.style.display = 'none'; }

  document.querySelectorAll('.result-tab').forEach(function (t) {
    t.addEventListener('click', function () {
      document.querySelectorAll('.result-tab').forEach(function (x) { x.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function (x) { x.classList.remove('active'); });
      t.classList.add('active');
      document.getElementById('tab-' + t.dataset.tab).classList.add('active');
    });
  });

  function renderMeta(d) {
    document.getElementById('meta-bar').innerHTML = [
      ['Location', d.location],
      ['Timezone', d.moment.timezone],
      ['System', d.zodiac_system],
      ['Coordinates', d.moment.latitude.toFixed(4) + ', ' + d.moment.longitude.toFixed(4)],
    ].map(function (x) { return '<div class="meta-item">' + x[0] + ': <b>' + x[1] + '</b></div>'; }).join('');
  }

  var sorts = {};

  function renderTable(id, rows, cid) {
    var t = document.getElementById(id);
    if (cid) document.getElementById(cid).textContent = rows ? rows.length : 0;
    if (!rows || !rows.length) { t.innerHTML = '<tbody><tr><td style="color:#c4bdb4;padding:20px">No data available</td></tr></tbody>'; return; }
    var k = Object.keys(rows[0]);
    t.innerHTML = '<thead><tr>' + k.map(function (c) { return '<th data-col="' + c + '">' + c + '</th>'; }).join('') + '</tr></thead><tbody>' +
      rows.map(function (r) {
        return '<tr>' + k.map(function (c) {
          var v = r[c];
          if (v == null) return '<td class="num">—</td>';
          if (typeof v === 'number') return '<td class="num">' + (Number.isInteger(v) ? v : v.toFixed(4)) + '</td>';
          return '<td>' + v + '</td>';
        }).join('') + '</tr>';
      }).join('') + '</tbody>';

    t.querySelectorAll('th').forEach(function (th) {
      th.addEventListener('click', function () {
        var c = th.dataset.col, key = id + c;
        var dir = sorts[key] === 'asc' ? 'desc' : 'asc';
        sorts[key] = dir;
        var s = rows.slice().sort(function (a, b) {
          var x = a[c], y = b[c];
          if (x == null) return 1; if (y == null) return -1;
          if (typeof x === 'number') return dir === 'asc' ? x - y : y - x;
          return dir === 'asc' ? String(x).localeCompare(String(y)) : String(y).localeCompare(String(x));
        });
        renderTable(id, s, cid);
        var h = t.querySelector('th[data-col="' + c + '"]');
        if (h) h.classList.add(dir === 'asc' ? 'sorted-asc' : 'sorted-desc');
      });
    });
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault(); hideErr();
    results.style.display = 'none'; emptyState.style.display = 'none';
    spinner.style.display = 'block'; submitBtn.disabled = true;

    var p = payload(), h = { 'Content-Type': 'application/json' };
    var body = JSON.stringify(p);

    Promise.allSettled([
      fetch('/chart', { method: 'POST', headers: h, body: body }),
      fetch('/chart/wheel', { method: 'POST', headers: h, body: body }),
      fetch('/chart/wordcloud', { method: 'POST', headers: h, body: body }),
    ]).then(function (r) {
      spinner.style.display = 'none'; submitBtn.disabled = false;

      if (r[0].status === 'rejected' || !r[0].value.ok) {
        (r[0].status === 'rejected' ? Promise.resolve('Network error') : r[0].value.json().then(function (d) { return d.detail || 'Failed'; }))
          .then(function (m) { showErr(m); });
        return;
      }

      r[0].value.json().then(function (d) {
        renderMeta(d);
        renderTable('bodies-table', d.bodies, 'body-count');
        renderTable('aspects-table', d.aspects, 'aspect-count');
        results.style.display = '';
        document.querySelectorAll('.result-tab').forEach(function (x) { x.classList.remove('active'); });
        document.querySelectorAll('.tab-panel').forEach(function (x) { x.classList.remove('active'); });
        document.querySelector('[data-tab="positions"]').classList.add('active');
        document.getElementById('tab-positions').classList.add('active');
      });

      var wc = document.getElementById('wheel-container');
      if (r[1].status === 'fulfilled' && r[1].value.ok) {
        r[1].value.text().then(function (html) {
          wc.innerHTML = '';
          var f = document.createElement('iframe');
          f.setAttribute('sandbox', 'allow-scripts');
          wc.appendChild(f);
          f.contentDocument.open(); f.contentDocument.write(html); f.contentDocument.close();
        });
      } else { wc.innerHTML = '<div class="empty-state">Chart wheel unavailable</div>'; }

      var cc = document.getElementById('wordcloud-container');
      if (r[2].status === 'fulfilled' && r[2].value.ok) {
        r[2].value.blob().then(function (b) {
          cc.innerHTML = '<img src="' + URL.createObjectURL(b) + '" alt="Traits"><p class="wc-note">Strengths and stress indicators based on planetary placements</p>';
        });
      } else { cc.innerHTML = '<div class="empty-state">Trait analysis unavailable</div>'; }
    });
  });
})();
</script>
</body>
</html>
