<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Chart</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#f5f3f0;color:#3d3a36;font-size:13px;line-height:1.5}

.toolbar{display:flex;align-items:center;background:#fff;border-bottom:1px solid #e8e4df;padding:0 16px;height:44px}
.brand{font-size:15px;font-weight:600;color:#5a4e3c;margin-right:20px;white-space:nowrap}
.brand span{font-weight:400;color:#a09788}
.toolbar form{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap}
.sep{width:1px;height:22px;background:#e8e4df;flex-shrink:0}
.toolbar label{font-size:11px;color:#9b9185;white-space:nowrap;flex-shrink:0}
.toolbar input,.toolbar select{padding:4px 8px;border:1px solid #ddd8d1;border-radius:3px;background:#fcfbf9;color:#3d3a36;font-size:12px;font-family:inherit}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:#b09e82}
.toolbar input[type="date"]{width:145px}
.toolbar input[type="time"]{width:115px}
.toolbar input[type="text"]{width:160px}
.toolbar select{width:90px}
.hp{position:absolute;left:-9999px;opacity:0;pointer-events:none}
.btn-calc{padding:5px 16px;border:none;border-radius:3px;background:#8b7355;color:#fff;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap}
.btn-calc:hover{background:#7a644a}
.btn-calc:disabled{opacity:.4;cursor:not-allowed}

.error-bar{background:#fdf2f2;border-bottom:1px solid #e8c4c4;color:#9b4d4d;padding:6px 16px;font-size:12px;display:none}
.meta-bar{display:flex;gap:16px;padding:5px 16px;background:#faf8f5;border-bottom:1px solid #e8e4df;flex-wrap:wrap}
.meta-item{font-size:11px;color:#9b9185}
.meta-item b{color:#5a4e3c;font-weight:500}

.page{display:none;padding:10px 16px}
.page.active{display:block}

.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.row-3{grid-template-columns:1fr 1fr 1fr}
.card{background:#fff;border:1px solid #e8e4df;border-radius:5px;overflow:hidden;display:flex;flex-direction:column}
.card-wheel{height:580px}
.card-sm{height:280px}

.card-hdr{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;background:#faf8f5;border-bottom:1px solid #e8e4df;flex-shrink:0}
.card-hdr-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#9b9185}
.copy-btn{padding:2px 9px;border:1px solid #ddd8d1;border-radius:3px;background:#fff;color:#8b7355;font-size:10px;cursor:pointer;font-family:inherit}
.copy-btn:hover{background:#ece7df}
.card-body{flex:1;overflow:auto;min-height:0}

/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:5px;padding:3px 10px;background:#fdf9f5;border-bottom:1px solid #e8e4df;flex-wrap:wrap;flex-shrink:0}
.filter-bar label{font-size:9.5px;color:#8a8279;display:flex;align-items:center;gap:2px;cursor:pointer;white-space:nowrap}
.filter-bar input[type="checkbox"]{width:11px;height:11px;accent-color:#8b7355}
.filter-bar .orb-ctl{display:flex;align-items:center;gap:3px;margin-left:auto}
.filter-bar .orb-ctl input[type="range"]{width:50px;height:10px;accent-color:#8b7355}
.filter-bar .orb-val{font-size:9.5px;color:#5a4e3c;font-weight:600;min-width:16px}

canvas{display:block;width:100%;height:100%}

/* Traits word cloud */
.wc{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;align-content:center;padding:6px 8px;text-align:center;flex:1;overflow:auto;line-height:1.4}
.wc .w{display:inline-block;margin:1px 3px;color:#5a4e3c;white-space:nowrap}

/* Patterns */
.pat-list{padding:6px 8px;font-size:11px;line-height:1.5;overflow:auto}
.pat-item{border-bottom:1px solid #f0ece7;padding:4px 0}
.pat-item:last-child{border-bottom:none}
.pat-type{font-weight:600;color:#5a4e3c}
.pat-bodies{color:#8b7355;font-size:10px}
.pat-score{float:right;font-size:10px;color:#b09e82}

/* Info box */
.info-box{padding:4px 8px;font-size:10px;line-height:1.6;font-family:'Menlo','Consolas','Courier New',monospace;white-space:pre-wrap;word-break:break-word;user-select:text}
.s-hdr{color:#b09e82;font-size:9px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #f0ece7;margin-top:4px;margin-bottom:1px;padding-bottom:1px}
.retro{color:#c0392b}
.asp-line{color:#7a6e65}

/* Harmonics */
.harm-bar{display:flex;align-items:flex-end;gap:3px;padding:8px 10px 4px;height:100%;overflow-x:auto}
.harm-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:24px}
.harm-bar-fill{width:18px;border-radius:3px 3px 0 0;background:#c9b896;min-height:2px;transition:height .3s}
.harm-lbl{font-size:8px;color:#9b9185;margin-top:2px}
.harm-name{font-size:7px;color:#b09e82;margin-top:1px;white-space:nowrap}

.empty-page{display:flex;align-items:center;justify-content:center;height:calc(100vh - 60px);color:#c4bdb4;font-size:14px}
.loading{display:none;text-align:center;padding:40px;color:#9b9185}
.loading::before{content:'';display:inline-block;width:16px;height:16px;border:2px solid #e8e4df;border-top-color:#8b7355;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:900px){.row,.row-3{grid-template-columns:1fr}.card-wheel{height:440px}.toolbar{height:auto;padding:8px 12px}.sep{display:none}.toolbar input[type="date"],.toolbar input[type="time"],.toolbar input[type="text"],.toolbar select{width:100%}}
</style>
</head>
<body>

<div class="toolbar">
  <div class="brand">Astro<span>Chart</span></div>
  <form id="chart-form">
    <label>Date</label><input type="date" id="birth-date" required>
    <div class="sep"></div>
    <label>Time</label><input type="time" id="birth-time" step="60" required>
    <div class="sep"></div>
    <label>Place</label><input type="text" id="location" placeholder="City, Country" required>
    <div class="sep"></div>
    <label>System</label>
    <select id="zodiac"><option value="Tropical">Tropical</option><option value="Sidereal">Sidereal</option></select>
    <input type="text" name="website" class="hp" tabindex="-1" autocomplete="off">
    <button type="submit" class="btn-calc" id="submit-btn">Calculate</button>
  </form>
</div>

<div id="error-bar" class="error-bar"></div>
<div class="loading" id="spinner">Calculating chart...</div>
<div id="empty-state" class="empty-page">Enter birth details above to generate your natal chart</div>

<div id="results" class="page">
  <div id="meta-bar" class="meta-bar"></div>
  <div style="padding:8px 0">
    <!-- Row 1: Wheel + Info -->
    <div class="row">
      <div class="card card-wheel">
        <div class="card-hdr"><span class="card-hdr-title">Chart Wheel</span></div>
        <div class="filter-bar" id="aspect-filters"></div>
        <div class="card-body"><canvas id="wheel-canvas"></canvas></div>
      </div>
      <div class="card card-wheel">
        <div class="card-hdr">
          <span class="card-hdr-title">Positions &amp; Aspects</span>
          <button class="copy-btn" onclick="copyInfo()">Copy</button>
        </div>
        <div class="card-body"><div class="info-box" id="info-box"></div></div>
      </div>
    </div>
    <!-- Row 2: Traits + Patterns + Harmonics -->
    <div class="row row-3">
      <div class="card card-sm">
        <div class="card-hdr"><span class="card-hdr-title">Strengths</span></div>
        <div class="card-body wc" id="traits-box"></div>
      </div>
      <div class="card card-sm">
        <div class="card-hdr"><span class="card-hdr-title">Patterns</span></div>
        <div class="card-body pat-list" id="patterns-box"></div>
      </div>
      <div class="card card-sm">
        <div class="card-hdr"><span class="card-hdr-title">Harmonics (1–32)</span></div>
        <div class="card-body"><div class="harm-bar" id="harm-box"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
var SIGNS=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
var SIGN_BG=['#fff0ef','#edf5ee','#fffce6','#e8f2fa','#fff0ef','#edf5ee','#fffce6','#e8f2fa','#fff0ef','#edf5ee','#fffce6','#e8f2fa'];
var SIGN_BD=['#e8c4c0','#b8d4ba','#e8dfa8','#b0cde0','#e8c4c0','#b8d4ba','#e8dfa8','#b0cde0','#e8c4c0','#b8d4ba','#e8dfa8','#b0cde0'];
var NAK=['Ashwini','Bharani','Krittika','Rohini','Mrigashira','Ardra','Punarvasu','Pushya','Ashlesha','Magha','P.Phalguni','U.Phalguni','Hasta','Chitra','Swati','Vishakha','Anuradha','Jyeshtha','Moola','P.Ashadha','U.Ashadha','Shravana','Dhanishta','Shatabhisha','P.Bhadrapada','U.Bhadrapada','Revati'];
var PA={Sun:'Su',Moon:'Mo',Mercury:'Me',Venus:'Ve',Mars:'Ma',Jupiter:'Ju',Saturn:'Sa',Uranus:'Ur',Neptune:'Ne',Pluto:'Pl',Chiron:'Ch','North Node':'Ra','South Node':'Ke',Fortune:'Fo'};
var PC={Sun:'#d4a017',Moon:'#b8b8b8',Mercury:'#4ec9b0',Venus:'#4a9fd5',Mars:'#d05050',Jupiter:'#c8963e',Saturn:'#8a7ad8',Uranus:'#a04040',Neptune:'#5bc0de',Pluto:'#aaa',Chiron:'#888','North Node':'#999','South Node':'#999',Fortune:'#c0a060'};
var ALL_ASP=['Opposition','Trine','Square','Quintile','Sextile','Septile','Semi-square','Novile','Decile','Undecile','Semi-sextile'];
var chartData=null, enabledAsp={}, maxOrb=8;
['Opposition','Trine','Square','Sextile'].forEach(function(a){enabledAsp[a]=true;});

function buildFilterBar(){
  var b=document.getElementById('aspect-filters'),h='';
  ALL_ASP.forEach(function(a){
    h+='<label><input type="checkbox" data-a="'+a+'"'+(enabledAsp[a]?' checked':'')+'>'+a+'</label>';
  });
  h+='<span class="orb-ctl"><span style="font-size:9.5px;color:#9b9185">Orb:</span><input type="range" id="orb-sl" min="1" max="12" value="'+maxOrb+'"><span class="orb-val" id="orb-v">'+maxOrb+'°</span></span>';
  b.innerHTML=h;
  b.querySelectorAll('input[type="checkbox"]').forEach(function(c){
    c.addEventListener('change',function(){enabledAsp[this.dataset.a]=this.checked;redraw();});
  });
  document.getElementById('orb-sl').addEventListener('input',function(){
    maxOrb=+this.value;document.getElementById('orb-v').textContent=maxOrb+'°';redraw();
  });
}
function fAsp(asp){return(asp||[]).filter(function(a){return enabledAsp[a.Aspect]&&Math.abs(a.Angle-a.Degrees)<=maxOrb;});}
function redraw(){if(chartData){requestAnimationFrame(function(){drawWheel(chartData);});buildInfoBox(chartData);}}

// ─── Wheel ────────────────────────────────────────────────────────────────────
function drawWheel(data){
  var cvs=document.getElementById('wheel-canvas'),par=cvs.parentElement;
  var dpr=window.devicePixelRatio||1,W=par.clientWidth,H=par.clientHeight;
  cvs.width=W*dpr;cvs.height=H*dpr;cvs.style.width=W+'px';cvs.style.height=H+'px';
  var ctx=cvs.getContext('2d');ctx.scale(dpr,dpr);
  var cx=W/2,cy=H/2,isSid=data.zodiac_system==='Sidereal';

  ctx.fillStyle='#faf8f5';ctx.fillRect(0,0,W,H);

  var R=Math.min(cx,cy)-4;
  var nkO=isSid?R:0, nkI=isSid?R*.87:0;
  var sO=isSid?nkI:R, sI=sO*.78, pR=sI*.82, hR=sI*.62;

  var asc=data.bodies.find(function(b){return b.Body==='Asc';});
  var rotL=asc?asc['Longitude (°)']:0;
  function l2a(l){return Math.PI-(l-rotL)*Math.PI/180;}

  // Nakshatra ring
  if(isSid){
    var ns=360/27;
    for(var ni=0;ni<27;ni++){
      var a1=l2a(ni*ns),a2=l2a((ni+1)*ns);
      ctx.beginPath();ctx.arc(cx,cy,nkO,a1,a2,true);ctx.arc(cx,cy,nkI,a2,a1,false);ctx.closePath();
      ctx.fillStyle=ni%2?'#ede8df':'#f5f0e8';ctx.fill();
      ctx.strokeStyle='#ddd6cb';ctx.lineWidth=.3;ctx.stroke();
      var nm=l2a(ni*ns+ns/2),nr=(nkO+nkI)/2;
      ctx.save();ctx.translate(cx+nr*Math.cos(nm),cy+nr*Math.sin(nm));
      var rot=nm;if(Math.cos(nm)<0)rot+=Math.PI;ctx.rotate(rot);
      ctx.font=Math.max(7,Math.round(R*.03))+'px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#8b7355';
      ctx.fillText(NAK[ni],0,0);ctx.restore();
    }
  }

  // Sign segments
  for(var i=0;i<12;i++){
    var a1=l2a(i*30),a2=l2a((i+1)*30);
    ctx.beginPath();ctx.arc(cx,cy,sO,a1,a2,true);ctx.arc(cx,cy,sI,a2,a1,false);ctx.closePath();
    ctx.fillStyle=SIGN_BG[i];ctx.fill();ctx.strokeStyle=SIGN_BD[i];ctx.lineWidth=.5;ctx.stroke();
    var ma=l2a(i*30+15),mr=(sO+sI)/2;
    ctx.save();ctx.translate(cx+mr*Math.cos(ma),cy+mr*Math.sin(ma));
    var tr=ma;if(Math.cos(ma)<0)tr+=Math.PI;ctx.rotate(tr);
    ctx.font=Math.max(9,Math.round(R*.045))+'px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#7a6e60';
    ctx.fillText(SIGNS[i],0,0);ctx.restore();
  }

  // Inner circles
  ctx.beginPath();ctx.arc(cx,cy,sI,0,2*Math.PI);ctx.strokeStyle='#d8d2c8';ctx.lineWidth=.5;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,hR,0,2*Math.PI);ctx.strokeStyle='#e8e2d8';ctx.lineWidth=.3;ctx.stroke();

  // House cusps
  var cusps=data.bodies.filter(function(b){return b.Body.indexOf('House Cusp')!==-1;});
  cusps.forEach(function(c){
    var a=l2a(c['Longitude (°)']);
    ctx.beginPath();ctx.moveTo(cx+hR*Math.cos(a),cy+hR*Math.sin(a));
    ctx.lineTo(cx+sI*Math.cos(a),cy+sI*Math.sin(a));
    ctx.strokeStyle='#d8d2c8';ctx.lineWidth=.4;ctx.stroke();
  });

  // House numbers
  var sc=cusps.slice().sort(function(a,b){return a['Longitude (°)']-b['Longitude (°)'];});
  for(var hi=0;hi<sc.length;hi++){
    var l1=sc[hi]['Longitude (°)'],l2=sc[(hi+1)%sc.length]['Longitude (°)'];
    if(l2<=l1)l2+=360;var hm=l2a((l1+l2)/2),hr2=(hR+sI)/2;
    ctx.font=Math.round(R*.035)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#c8c0b5';ctx.fillText(String(hi+1),cx+hr2*Math.cos(hm),cy+hr2*Math.sin(hm));
  }

  // Axis lines
  ['Asc','Desc','MC','IC'].forEach(function(n){
    var b=data.bodies.find(function(x){return x.Body===n;});if(!b)return;
    var a=l2a(b['Longitude (°)']);
    ctx.beginPath();ctx.moveTo(cx+hR*.3*Math.cos(a),cy+hR*.3*Math.sin(a));
    ctx.lineTo(cx+sI*Math.cos(a),cy+sI*Math.sin(a));
    ctx.strokeStyle='#8b7355';ctx.lineWidth=1.2;ctx.stroke();
  });

  // Aspect lines (filtered)
  var pm={};data.bodies.forEach(function(b){pm[b.Body]=b['Longitude (°)'];});
  fAsp(data.aspects).forEach(function(asp){
    var v1=pm[asp.Body1],v2=pm[asp.Body2];if(v1==null||v2==null)return;
    var a1=l2a(v1),a2=l2a(v2);
    ctx.beginPath();ctx.moveTo(cx+hR*Math.cos(a1),cy+hR*Math.sin(a1));
    ctx.lineTo(cx+hR*Math.cos(a2),cy+hR*Math.sin(a2));
    ctx.strokeStyle=asp.Color||'#999';
    ctx.globalAlpha=Math.max(.15,(asp.Closeness||.5)*.55);
    ctx.lineWidth=Math.max(.4,(asp.Closeness||.5)*1.2);ctx.stroke();ctx.globalAlpha=1;
  });

  // Planets
  var planets=data.bodies.filter(function(b){return b.Symbol&&b.Body.indexOf('House')===-1&&!['Asc','MC','Desc','IC'].includes(b.Body);});
  var dotR=Math.max(8,R*.038),placed=[];
  planets.forEach(function(p){
    var ba=l2a(p['Longitude (°)']),pr=pR;
    for(var k=0;k<placed.length;k++){
      var dx=pr*Math.cos(ba)-placed[k].x,dy=pr*Math.sin(ba)-placed[k].y;
      if(Math.sqrt(dx*dx+dy*dy)<dotR*3)pr-=dotR*2.2;
    }
    var px=cx+pr*Math.cos(ba),py=cy+pr*Math.sin(ba);
    placed.push({x:pr*Math.cos(ba),y:pr*Math.sin(ba)});

    var col=PC[p.Body]||'#888';
    ctx.beginPath();ctx.arc(px,py,dotR,0,2*Math.PI);
    ctx.fillStyle=col;ctx.globalAlpha=.85;ctx.fill();ctx.globalAlpha=1;
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();

    var ab=PA[p.Body]||p.Body.substring(0,2);
    if(p.Motion==='R')ab+='(R)';
    ctx.font='bold '+Math.max(8,Math.round(R*.035))+'px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';
    ctx.fillText(ab,px,py);

    var d=p['Longitude (°)']%30,dg=Math.floor(d),mn=Math.floor((d-dg)*60);
    var lx=px+(dotR+3)*Math.cos(ba-.3),ly=py+(dotR+3)*Math.sin(ba-.3);
    ctx.font=Math.max(7,Math.round(R*.028))+'px sans-serif';ctx.fillStyle='#9b9185';
    ctx.fillText(dg+'°'+(mn<10?'0':'')+mn+"'",lx,ly);
  });
}

// ─── Info box ─────────────────────────────────────────────────────────────────
function sd(l){if(l==null)return'';var d=l%30,dg=Math.floor(d),mn=Math.floor((d-dg)*60);return dg+'°'+(mn<10?'0':'')+mn+"'";}
function fd(d){if(d==null)return'';var dg=Math.floor(d),mn=Math.floor((d-dg)*60);return dg+'°'+(mn<10?'0':'')+mn+"'";}

function buildInfoBox(d){
  var isSid=d.zodiac_system==='Sidereal';
  var pl=d.bodies.filter(function(x){return x.Body&&x.Body.indexOf('House')===-1&&!['Asc','MC','Desc','IC'].includes(x.Body);});
  var an=d.bodies.filter(function(x){return['Asc','MC','Desc','IC'].indexOf(x.Body)!==-1;});
  var ho=d.bodies.filter(function(x){return x.Body&&x.Body.indexOf('House Cusp')!==-1;});
  var h='<div class="s-hdr">Planets</div>';
  pl.forEach(function(p){
    var m=p.Motion==='R'?'<span class="retro">(R)</span>':'(D)';
    var hs=p.House?' • H'+p.House:'';
    var nk=(isSid&&p.Nakshatra)?' • '+p.Nakshatra+' P'+p.Pada:'';
    h+=(p.Symbol||'')+p.Body+' '+m+' '+p.Sign+' '+sd(p['Longitude (°)'])+hs+nk+'\n';
  });
  if(an.length){h+='<div class="s-hdr">Angles</div>';an.forEach(function(a){h+=a.Body+' '+a.Sign+' '+sd(a['Longitude (°)'])+'\n';});}
  if(ho.length){h+='<div class="s-hdr">Houses</div>';ho.forEach(function(x){h+=x.Body.replace('House Cusp ','H')+' '+x.Sign+' '+sd(x['Longitude (°)'])+'\n';});}
  var fa=fAsp(d.aspects);
  if(fa.length){
    h+='<div class="s-hdr">Aspects ('+fa.length+')</div>';
    fa.forEach(function(a){
      var orb=(a.Angle!=null&&a.Degrees!=null)?fd(Math.abs(a.Angle-a.Degrees)):'';
      h+='<span class="asp-line">'+a.Body1+' '+(a.aspect_symbol||'')+' '+a.Body2+' '+a.Aspect+(orb?' orb '+orb:'')+'</span>\n';
    });
  }
  document.getElementById('info-box').innerHTML=h;
}

function copyInfo(){
  navigator.clipboard.writeText(document.getElementById('info-box').innerText).then(function(){
    var b=document.querySelector('.copy-btn');b.textContent='Copied!';setTimeout(function(){b.textContent='Copy';},1500);
  });
}

// ─── Traits (word cloud) ─────────────────────────────────────────────────────
function buildTraits(traits){
  var box=document.getElementById('traits-box');
  if(!traits||!traits.length){box.innerHTML='<span style="color:#c4bdb4;font-size:11px">No data</span>';return;}
  var maxW=traits[0].weight||1;
  box.innerHTML=traits.map(function(t){
    var s=Math.max(10,Math.min(28,10+18*(t.weight/maxW)));
    var op=Math.max(.5,.5+.5*(t.weight/maxW));
    return '<span class="w" style="font-size:'+s+'px;opacity:'+op+'">'+t.word+'</span>';
  }).join(' ');
}

// ─── Patterns ─────────────────────────────────────────────────────────────────
function buildPatterns(pats){
  var box=document.getElementById('patterns-box');
  if(!pats||!pats.length){box.innerHTML='<span style="color:#c4bdb4;font-size:11px;padding:12px;display:block">No patterns detected</span>';return;}
  box.innerHTML=pats.map(function(p){
    var sc=p.score!=null?'<span class="pat-score">'+Math.round(p.score*100)+'%</span>':'';
    return '<div class="pat-item">'+sc+'<span class="pat-type">'+p.type+'</span><br><span class="pat-bodies">'+(p.bodies||[]).join(' – ')+'</span></div>';
  }).join('');
}

// ─── Harmonics bar chart (1–32) ──────────────────────────────────────────────
function buildHarmonics(harms){
  var box=document.getElementById('harm-box');
  if(!harms||!harms.length){box.innerHTML='<span style="color:#c4bdb4;font-size:11px;padding:12px;display:block">No data</span>';return;}
  var filtered=harms.filter(function(h){return h.harmonic<=32;});
  if(!filtered.length){box.innerHTML='<span style="color:#c4bdb4;font-size:11px;padding:12px;display:block">No data</span>';return;}
  var maxS=Math.max.apply(null,filtered.map(function(h){return h.score;}));
  box.innerHTML=filtered.map(function(h){
    var pct=maxS>0?Math.round(h.score/maxS*100):0;
    var ht=Math.max(3,pct*1.8);
    return '<div class="harm-col"><div class="harm-bar-fill" style="height:'+ht+'px" title="H'+h.harmonic+': '+h.name+' ('+h.score.toFixed(1)+')"></div><div class="harm-lbl">'+h.harmonic+'</div></div>';
  }).join('');
}

// ─── Meta bar ─────────────────────────────────────────────────────────────────
function buildMeta(d){
  var items=[['Location',d.location],['Timezone',d.moment.timezone],['System',d.zodiac_system]];
  if(d.ayanamsa!=null)items.push(['Ayanamsa',fd(d.ayanamsa)]);
  document.getElementById('meta-bar').innerHTML=items.map(function(x){
    return '<div class="meta-item">'+x[0]+': <b>'+x[1]+'</b></div>';
  }).join('');
}

// ─── Form ─────────────────────────────────────────────────────────────────────
(function(){
  buildFilterBar();
  var form=document.getElementById('chart-form'),spinner=document.getElementById('spinner'),
      results=document.getElementById('results'),empty=document.getElementById('empty-state'),
      errBar=document.getElementById('error-bar'),btn=document.getElementById('submit-btn');

  form.addEventListener('submit',function(e){
    e.preventDefault();errBar.style.display='none';
    results.classList.remove('active');empty.style.display='none';
    spinner.style.display='block';btn.disabled=true;

    var p={
      birth_datetime:document.getElementById('birth-date').value+'T'+document.getElementById('birth-time').value+':00',
      location:document.getElementById('location').value.trim(),
      zodiac_system:document.getElementById('zodiac').value,
    };

    fetch('/chart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})
      .then(function(r){if(!r.ok)return r.json().then(function(d){throw new Error(d.detail||'Failed');});return r.json();})
      .then(function(d){
        spinner.style.display='none';btn.disabled=false;
        chartData=d;
        buildMeta(d);buildTraits(d.traits);buildPatterns(d.patterns);buildHarmonics(d.harmonics);buildInfoBox(d);
        results.classList.add('active');
        requestAnimationFrame(function(){drawWheel(d);});
      })
      .catch(function(ex){
        spinner.style.display='none';btn.disabled=false;
        errBar.textContent=ex.message||'Network error';errBar.style.display='block';empty.style.display='flex';
      });
  });
  window.addEventListener('resize',function(){if(chartData)requestAnimationFrame(function(){drawWheel(chartData);});});
})();
</script>
</body>
</html>
