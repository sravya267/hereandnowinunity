<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Chart - Natal Chart Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #f5f3f0;
    color: #3d3a36;
    font-size: 13px;
    line-height: 1.5;
  }

  .toolbar {
    display: flex;
    align-items: center;
    background: #fff;
    border-bottom: 1px solid #e8e4df;
    padding: 0 16px;
    height: 44px;
  }

  .brand {
    font-size: 15px;
    font-weight: 600;
    color: #5a4e3c;
    margin-right: 20px;
    white-space: nowrap;
  }
  .brand span { font-weight: 400; color: #a09788; }

  .toolbar form {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }

  .sep { width: 1px; height: 22px; background: #e8e4df; flex-shrink: 0; }

  .toolbar label { font-size: 11px; color: #9b9185; white-space: nowrap; flex-shrink: 0; }

  .toolbar input,
  .toolbar select {
    padding: 4px 8px;
    border: 1px solid #ddd8d1;
    border-radius: 3px;
    background: #fcfbf9;
    color: #3d3a36;
    font-size: 12px;
    font-family: inherit;
  }
  .toolbar input:focus,
  .toolbar select:focus { outline: none; border-color: #b09e82; }

  .toolbar input[type="date"] { width: 145px; }
  .toolbar input[type="time"] { width: 115px; }
  .toolbar input[type="text"] { width: 160px; }
  .toolbar select { width: 90px; }

  .btn-calc {
    padding: 5px 16px;
    border: none;
    border-radius: 3px;
    background: #8b7355;
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-calc:hover { background: #7a644a; }
  .btn-calc:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-bar {
    background: #fdf2f2;
    border-bottom: 1px solid #e8c4c4;
    color: #9b4d4d;
    padding: 6px 16px;
    font-size: 12px;
    display: none;
  }

  .meta-bar {
    display: flex;
    gap: 18px;
    padding: 6px 16px;
    background: #faf8f5;
    border-bottom: 1px solid #e8e4df;
    flex-wrap: wrap;
  }
  .meta-item { font-size: 11px; color: #9b9185; }
  .meta-item b { color: #5a4e3c; font-weight: 500; }

  .page { display: none; padding: 12px 16px; }
  .page.active { display: block; }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .card {
    background: #fff;
    border: 1px solid #e8e4df;
    border-radius: 5px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .card-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9b9185;
    padding: 6px 10px;
    background: #faf8f5;
    border-bottom: 1px solid #e8e4df;
    flex-shrink: 0;
  }

  .card-body {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  .row-main .card { height: 520px; }

  .wheel-frame { width: 100%; height: 100%; border: none; }

  .wc-wrap { padding: 8px; text-align: center; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .wc-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }

  .info-box {
    padding: 8px 10px;
    font-size: 12px;
    line-height: 1.7;
    font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
    font-variant-numeric: tabular-nums;
    user-select: text;
    cursor: text;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .info-box .planet-line { color: #3d3a36; }
  .info-box .section-hdr {
    color: #9b9185;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 8px;
    border-bottom: 1px solid #f0ece7;
    padding-bottom: 2px;
    margin-bottom: 2px;
  }
  .info-box .retro { color: #c0392b; }
  .info-box .aspect-line { color: #6b6358; font-size: 11px; }

  .note { color: #9b9185; font-size: 11px; margin-top: 6px; text-align: center; }

  .empty-page {
    display: flex;
    align-items: center;
    justify-content: center;
    height: calc(100vh - 60px);
    color: #c4bdb4;
    font-size: 14px;
  }

  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: #9b9185;
  }
  .loading::before {
    content: '';
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid #e8e4df;
    border-top-color: #8b7355;
    border-radius: 50%;
    animation: sp 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes sp { to { transform: rotate(360deg); } }

  @media (max-width: 1100px) {
    .row { grid-template-columns: 1fr 1fr; }
    .row-main .card { height: 440px; }
  }
  @media (max-width: 700px) {
    .row { grid-template-columns: 1fr; }
    .toolbar { height: auto; padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
    .toolbar form { flex-wrap: wrap; }
    .sep { display: none; }
    .toolbar input[type="date"],
    .toolbar input[type="time"],
    .toolbar input[type="text"],
    .toolbar select { width: 100%; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="brand">Astro<span>Chart</span></div>
  <form id="chart-form">
    <label>Date</label>
    <input type="date" id="birth-date" required>
    <div class="sep"></div>
    <label>Time</label>
    <input type="time" id="birth-time" step="60" required>
    <div class="sep"></div>
    <label>Place</label>
    <input type="text" id="location" placeholder="City, Country" required>
    <div class="sep"></div>
    <label>System</label>
    <select id="zodiac">
      <option value="Tropical">Tropical</option>
      <option value="Sidereal">Sidereal</option>
    </select>
    <button type="submit" class="btn-calc" id="submit-btn">Calculate</button>
  </form>
</div>

<div id="error-bar" class="error-bar"></div>
<div class="loading" id="spinner">Calculating chart...</div>
<div id="empty-state" class="empty-page">Enter birth details above to generate your natal chart</div>

<div id="results" class="page">
  <div id="meta-bar" class="meta-bar"></div>

  <div style="padding:12px 0;">
    <!-- Main row: wheel | traits | info -->
    <div class="row row-main">
      <div class="card">
        <div class="card-title">Chart Wheel</div>
        <div class="card-body" id="wheel-container"></div>
      </div>
      <div class="card">
        <div class="card-title">Personality Traits</div>
        <div class="card-body wc-wrap" id="wordcloud-container"></div>
      </div>
      <div class="card">
        <div class="card-title">Planetary Positions &amp; Aspects</div>
        <div class="card-body">
          <div class="info-box" id="info-box"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var form = document.getElementById('chart-form');
  var spinner = document.getElementById('spinner');
  var results = document.getElementById('results');
  var empty = document.getElementById('empty-state');
  var errBar = document.getElementById('error-bar');
  var btn = document.getElementById('submit-btn');

  var SIGNS = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];

  function payload() {
    return {
      birth_datetime: document.getElementById('birth-date').value + 'T' + document.getElementById('birth-time').value + ':00',
      location: document.getElementById('location').value.trim(),
      zodiac_system: document.getElementById('zodiac').value,
    };
  }

  function err(m) { errBar.textContent = m; errBar.style.display = 'block'; }
  function clr() { errBar.style.display = 'none'; }

  function signDeg(lon) {
    if (lon == null) return '';
    var d = lon % 30;
    var deg = Math.floor(d);
    var min = Math.floor((d - deg) * 60);
    return deg + '\u00b0' + (min < 10 ? '0' : '') + min + "'";
  }

  function fmtDeg(d) {
    if (d == null) return '';
    var deg = Math.floor(d);
    var min = Math.floor((d - deg) * 60);
    return deg + '\u00b0' + (min < 10 ? '0' : '') + min + "'";
  }

  function meta(d) {
    var items = [
      ['Location', d.location],
      ['Timezone', d.moment.timezone],
      ['System', d.zodiac_system],
      ['Coords', d.moment.latitude.toFixed(4) + ', ' + d.moment.longitude.toFixed(4)],
    ];
    if (d.ayanamsa != null) items.push(['Ayanamsa (Lahiri)', fmtDeg(d.ayanamsa)]);
    document.getElementById('meta-bar').innerHTML = items.map(function (x) {
      return '<div class="meta-item">' + x[0] + ': <b>' + x[1] + '</b></div>';
    }).join('');
  }

  function buildInfoBox(d) {
    var box = document.getElementById('info-box');
    var html = '';
    var isSidereal = d.zodiac_system === 'Sidereal';

    var planets = d.bodies.filter(function (x) {
      return x.Body && x.Body.indexOf('House') === -1 &&
        x.Body !== 'Asc' && x.Body !== 'MC' && x.Body !== 'Desc' && x.Body !== 'IC';
    });

    html += '<div class="section-hdr">Planets</div>';
    planets.forEach(function (p) {
      var sym = p.Symbol || '';
      var motion = p.Motion === 'R' ? ' <span class="retro">(R)</span>' : p.Motion === 'D' ? ' (D)' : '';
      var house = p.House ? ' in ' + p.House + (p.House === '1' ? 'st' : p.House === '2' ? 'nd' : p.House === '3' ? 'rd' : 'th') + ' House' : '';
      var nak = '';
      if (isSidereal && p.Nakshatra) {
        nak = ' \u2022 ' + p.Nakshatra + ' P' + p.Pada + ' (' + p['Nak Lord'] + ')';
      }
      html += '<div class="planet-line">' + sym + ' ' + p.Body + motion + '  in ' + p.Sign + ' ' + signDeg(p['Longitude (\u00b0)']) + house + nak + '</div>';
    });

    var angles = d.bodies.filter(function (x) {
      return x.Body === 'Asc' || x.Body === 'MC' || x.Body === 'Desc' || x.Body === 'IC';
    });
    if (angles.length) {
      html += '<div class="section-hdr">Angles</div>';
      angles.forEach(function (a) {
        html += '<div class="planet-line">' + a.Body + '  in ' + a.Sign + ' ' + signDeg(a['Longitude (\u00b0)']) + '</div>';
      });
    }

    var houses = d.bodies.filter(function (x) { return x.Body && x.Body.indexOf('House Cusp') !== -1; });
    if (houses.length) {
      html += '<div class="section-hdr">Houses</div>';
      houses.forEach(function (h) {
        var num = h.Body.replace('House Cusp ', '');
        html += '<div class="planet-line">House ' + num + '  in ' + h.Sign + ' ' + signDeg(h['Longitude (\u00b0)']) + '</div>';
      });
    }

    if (d.aspects && d.aspects.length) {
      html += '<div class="section-hdr">Aspects (' + d.aspects.length + ')</div>';
      d.aspects.forEach(function (a) {
        var orb = a.Angle != null && a.Degrees != null ? fmtDeg(Math.abs(a.Angle - a.Degrees)) : '';
        html += '<div class="aspect-line">' + a.Body1 + ' ' + (a.aspect_symbol || '') + ' ' + a.Body2 + '  ' + a.Aspect + (orb ? ' (orb ' + orb + ')' : '') + '</div>';
      });
    }

    box.innerHTML = html;
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault(); clr();
    results.classList.remove('active'); empty.style.display = 'none';
    spinner.style.display = 'block'; btn.disabled = true;

    var p = payload(), h = { 'Content-Type': 'application/json' }, b = JSON.stringify(p);

    fetch('/chart', { method: 'POST', headers: h, body: b })
      .then(function (r) {
        if (!r.ok) return r.json().then(function (d) { throw new Error(d.detail || 'Failed'); });
        return r.json();
      })
      .then(function (d) {
        spinner.style.display = 'none'; btn.disabled = false;
        meta(d);
        buildInfoBox(d);
        results.classList.add('active');

        fetch('/chart/wheel', { method: 'POST', headers: h, body: b })
          .then(function (r) { return r.ok ? r.text() : null; })
          .then(function (html) {
            var wc = document.getElementById('wheel-container');
            if (html) {
              var f = document.createElement('iframe');
              f.className = 'wheel-frame';
              f.srcdoc = html;
              wc.innerHTML = '';
              wc.appendChild(f);
            } else {
              wc.innerHTML = '<p class="note" style="padding:20px;">Chart wheel unavailable</p>';
            }
          })
          .catch(function () {
            document.getElementById('wheel-container').innerHTML = '<p class="note" style="padding:20px;">Chart wheel unavailable</p>';
          });

        fetch('/chart/wordcloud', { method: 'POST', headers: h, body: b })
          .then(function (r) { return r.ok ? r.blob() : null; })
          .then(function (bl) {
            var cc = document.getElementById('wordcloud-container');
            if (bl) {
              cc.innerHTML = '<img class="wc-wrap" src="' + URL.createObjectURL(bl) + '" alt="Personality Traits">';
            } else {
              cc.innerHTML = '<p class="note">Trait analysis unavailable</p>';
            }
          })
          .catch(function () {
            document.getElementById('wordcloud-container').innerHTML = '<p class="note">Trait analysis unavailable</p>';
          });
      })
      .catch(function (ex) {
        spinner.style.display = 'none'; btn.disabled = false;
        err(ex.message || 'Network error');
        empty.style.display = 'flex';
      });
  });
})();
</script>
</body>
</html>
