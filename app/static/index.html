<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Chart</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: #0a0a1a;
    color: #b8bfcf;
    font-size: 12px;
    line-height: 1.4;
  }

  .topbar {
    display: flex;
    align-items: center;
    padding: 8px 20px;
    background: linear-gradient(90deg, #0d0d24 0%, #1a1035 50%, #0d0d24 100%);
    border-bottom: 1px solid #2a1f4e;
  }

  .topbar h1 {
    font-size: 14px;
    font-weight: 600;
    color: #d4b8ff;
    letter-spacing: 0.05em;
  }

  .topbar .subtitle { color: #6b5f8a; font-size: 11px; margin-left: 8px; }

  .dashboard {
    display: grid;
    grid-template-columns: 250px 1fr;
    height: calc(100vh - 37px);
  }

  .filters {
    background: linear-gradient(180deg, #100e24 0%, #0c0b1e 100%);
    border-right: 1px solid #1e1845;
    padding: 16px;
    overflow-y: auto;
  }

  .filter-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #7b6ba0;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid #1e1845;
  }

  .filter-group { margin-bottom: 14px; }

  .filter-group label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #8878a9;
    margin-bottom: 4px;
  }

  .filter-group input,
  .filter-group select {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #2a1f4e;
    border-radius: 4px;
    background: #08071a;
    color: #d4d0e8;
    font-size: 12px;
    font-family: inherit;
  }

  .filter-group input:focus,
  .filter-group select:focus {
    outline: none;
    border-color: #7c5cbf;
    box-shadow: 0 0 0 2px rgba(124,92,191,0.2);
  }

  .btn-generate {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 4px;
    background: linear-gradient(135deg, #6b3fa0, #9b59b6);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.15s;
  }

  .btn-generate:hover { opacity: 0.9; }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-msg {
    background: #1f0a1a;
    border: 1px solid #6b2050;
    color: #e86090;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-top: 8px;
    display: none;
  }

  .status-bar {
    padding: 6px 16px;
    background: linear-gradient(90deg, #100e24 0%, #14102a 100%);
    border-bottom: 1px solid #1e1845;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #6b5f8a;
  }

  .status-item .val { color: #c4b5e0; font-weight: 500; }

  .content {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .view-tabs {
    display: flex;
    gap: 0;
    padding: 0 16px;
    background: #100e24;
    border-bottom: 1px solid #1e1845;
    flex-shrink: 0;
  }

  .view-tab {
    padding: 8px 14px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #6b5f8a;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.15s;
  }

  .view-tab:hover { color: #c4b5e0; }
  .view-tab.active { color: #d4b8ff; border-bottom-color: #9b59b6; }

  .view-panel { display: none; overflow: auto; padding: 16px; flex: 1; }
  .view-panel.active { display: block; }

  .section-header {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #7b6ba0;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-header .count {
    background: #1e1845;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 10px;
    color: #8878a9;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }

  thead { position: sticky; top: 0; z-index: 1; }

  th {
    text-align: left;
    padding: 6px 10px;
    background: #100e24;
    border-bottom: 1px solid #1e1845;
    color: #7b6ba0;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  th:hover { color: #d4b8ff; }
  th.sorted-asc::after { content: ' \25B2'; font-size: 8px; }
  th.sorted-desc::after { content: ' \25BC'; font-size: 8px; }

  td {
    padding: 5px 10px;
    border-bottom: 1px solid #12102a;
    white-space: nowrap;
  }

  tr:hover td { background: rgba(155,89,182,0.06); }

  td.num { text-align: right; font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; color: #a08ec8; }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #3d3560;
    font-size: 13px;
  }

  #wheel-container { height: 100%; }
  #wheel-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 4px;
  }

  #wordcloud-container { text-align: center; }
  #wordcloud-container img { max-width: 100%; border-radius: 4px; }

  .wc-note { color: #6b5f8a; font-size: 11px; margin-top: 6px; }

  .spinner {
    display: none;
    text-align: center;
    padding: 40px;
    color: #6b5f8a;
    font-size: 12px;
  }

  .spinner::before {
    content: '';
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #1e1845;
    border-top-color: #9b59b6;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .dashboard { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .filters { border-right: none; border-bottom: 1px solid #1e1845; padding: 12px; }
    .filter-title { display: none; }
    .filters form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn-generate { grid-column: 1 / -1; }
    .error-msg { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:baseline;">
    <h1>Astro Chart</h1>
    <span class="subtitle">Natal chart calculation</span>
  </div>
</div>

<div class="dashboard">
  <div class="filters">
    <div class="filter-title">Filters</div>
    <form id="chart-form">
      <div class="filter-group">
        <label for="birth-date">Birth Date</label>
        <input type="date" id="birth-date" required>
      </div>
      <div class="filter-group">
        <label for="birth-time">Birth Time</label>
        <input type="time" id="birth-time" step="60" required>
      </div>
      <div class="filter-group">
        <label for="location">Location</label>
        <input type="text" id="location" placeholder="City, Country" required>
      </div>
      <div class="filter-group">
        <label for="zodiac">Zodiac System</label>
        <select id="zodiac">
          <option value="Tropical">Tropical</option>
          <option value="Sidereal">Sidereal</option>
        </select>
      </div>
      <button type="submit" class="btn-generate" id="submit-btn">Generate</button>
      <div id="error-box" class="error-msg"></div>
    </form>
  </div>

  <div class="content">
    <div class="spinner" id="spinner">Loading chart data...</div>

    <div id="empty-state" class="empty-state">Enter birth details and click Generate</div>

    <div id="results" style="display:none;">
      <div id="status-bar" class="status-bar"></div>

      <div style="display:flex;flex-direction:column;overflow:hidden;flex:1;">
        <div class="view-tabs">
          <button class="view-tab active" data-tab="data">Positions</button>
          <button class="view-tab" data-tab="aspects">Aspects</button>
          <button class="view-tab" data-tab="wheel">Wheel</button>
          <button class="view-tab" data-tab="wordcloud">Word Cloud</button>
        </div>

        <div id="tab-data" class="view-panel active">
          <div class="section-header">Planetary Positions <span class="count" id="body-count"></span></div>
          <table id="bodies-table"><thead><tr></tr></thead><tbody></tbody></table>
        </div>

        <div id="tab-aspects" class="view-panel">
          <div class="section-header">Aspects <span class="count" id="aspect-count"></span></div>
          <table id="aspects-table"><thead><tr></tr></thead><tbody></tbody></table>
        </div>

        <div id="tab-wheel" class="view-panel">
          <div id="wheel-container"></div>
        </div>

        <div id="tab-wordcloud" class="view-panel">
          <div id="wordcloud-container"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var form = document.getElementById('chart-form');
  var spinner = document.getElementById('spinner');
  var results = document.getElementById('results');
  var emptyState = document.getElementById('empty-state');
  var errorBox = document.getElementById('error-box');
  var submitBtn = document.getElementById('submit-btn');

  function buildPayload() {
    return {
      birth_datetime: document.getElementById('birth-date').value + 'T' + document.getElementById('birth-time').value + ':00',
      location: document.getElementById('location').value.trim(),
      zodiac_system: document.getElementById('zodiac').value,
    };
  }

  function showError(msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; }
  function hideError() { errorBox.style.display = 'none'; }

  document.querySelectorAll('.view-tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.view-tab').forEach(function (t) { t.classList.remove('active'); });
      document.querySelectorAll('.view-panel').forEach(function (c) { c.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  function renderStatus(data) {
    var bar = document.getElementById('status-bar');
    var items = [
      ['Location', data.location],
      ['Timezone', data.moment.timezone],
      ['System', data.zodiac_system],
      ['Lat', data.moment.latitude.toFixed(4)],
      ['Lon', data.moment.longitude.toFixed(4)],
    ];
    bar.innerHTML = items.map(function (it) {
      return '<div class="status-item"><span>' + it[0] + ':</span><span class="val">' + it[1] + '</span></div>';
    }).join('');
  }

  var sortState = {};

  function renderTable(tableId, rows, countId) {
    var table = document.getElementById(tableId);
    if (countId) document.getElementById(countId).textContent = rows ? rows.length : 0;
    if (!rows || rows.length === 0) {
      table.innerHTML = '<tbody><tr><td style="color:#3d3560">No data</td></tr></tbody>';
      return;
    }
    var keys = Object.keys(rows[0]);
    var thead = '<tr>' + keys.map(function (k) { return '<th data-col="' + k + '">' + k + '</th>'; }).join('') + '</tr>';
    var tbody = rows.map(function (row) {
      return '<tr>' + keys.map(function (k) {
        var v = row[k];
        if (v === null || v === undefined) return '<td class="num">-</td>';
        if (typeof v === 'number') return '<td class="num">' + (Number.isInteger(v) ? v : v.toFixed(4)) + '</td>';
        return '<td>' + String(v) + '</td>';
      }).join('') + '</tr>';
    }).join('');
    table.innerHTML = '<thead>' + thead + '</thead><tbody>' + tbody + '</tbody>';

    table.querySelectorAll('th').forEach(function (th) {
      th.addEventListener('click', function () {
        var col = th.dataset.col;
        var key = tableId + ':' + col;
        var dir = sortState[key] === 'asc' ? 'desc' : 'asc';
        sortState[key] = dir;
        var sorted = rows.slice().sort(function (a, b) {
          var va = a[col], vb = b[col];
          if (va == null) return 1;
          if (vb == null) return -1;
          if (typeof va === 'number') return dir === 'asc' ? va - vb : vb - va;
          return dir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
        });
        renderTable(tableId, sorted, countId);
        var newTh = table.querySelector('th[data-col="' + col + '"]');
        if (newTh) newTh.classList.add(dir === 'asc' ? 'sorted-asc' : 'sorted-desc');
      });
    });
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    hideError();
    results.style.display = 'none';
    emptyState.style.display = 'none';
    spinner.style.display = 'block';
    submitBtn.disabled = true;

    var payload = buildPayload();
    var headers = { 'Content-Type': 'application/json' };

    var chartReq = fetch('/chart', { method: 'POST', headers: headers, body: JSON.stringify(payload) });
    var wheelReq = fetch('/chart/wheel', { method: 'POST', headers: headers, body: JSON.stringify(payload) });
    var cloudReq = fetch('/chart/wordcloud', { method: 'POST', headers: headers, body: JSON.stringify(payload) });

    Promise.allSettled([chartReq, wheelReq, cloudReq]).then(function (settled) {
      spinner.style.display = 'none';
      submitBtn.disabled = false;

      var chartRes = settled[0];
      var wheelRes = settled[1];
      var cloudRes = settled[2];

      if (chartRes.status === 'rejected' || !chartRes.value.ok) {
        var errP = chartRes.status === 'rejected'
          ? Promise.resolve(chartRes.reason.message || 'Network error')
          : chartRes.value.json().then(function (d) { return d.detail || 'Request failed'; });
        errP.then(function (msg) { showError(msg); emptyState.style.display = 'flex'; });
        return;
      }

      chartRes.value.json().then(function (data) {
        renderStatus(data);
        renderTable('bodies-table', data.bodies, 'body-count');
        renderTable('aspects-table', data.aspects, 'aspect-count');
        results.style.display = '';

        document.querySelectorAll('.view-tab').forEach(function (t) { t.classList.remove('active'); });
        document.querySelectorAll('.view-panel').forEach(function (c) { c.classList.remove('active'); });
        document.querySelector('[data-tab="data"]').classList.add('active');
        document.getElementById('tab-data').classList.add('active');
      });

      var wc = document.getElementById('wheel-container');
      if (wheelRes.status === 'fulfilled' && wheelRes.value.ok) {
        wheelRes.value.text().then(function (html) {
          wc.innerHTML = '';
          var iframe = document.createElement('iframe');
          iframe.setAttribute('sandbox', 'allow-scripts');
          wc.appendChild(iframe);
          iframe.contentDocument.open();
          iframe.contentDocument.write(html);
          iframe.contentDocument.close();
        });
      } else {
        wc.innerHTML = '<div class="empty-state">Wheel unavailable</div>';
      }

      var wcc = document.getElementById('wordcloud-container');
      if (cloudRes.status === 'fulfilled' && cloudRes.value.ok) {
        cloudRes.value.blob().then(function (blob) {
          var url = URL.createObjectURL(blob);
          wcc.innerHTML = '<img src="' + url + '" alt="Word Clouds"><p class="wc-note">Strengths (left) and Stress (right)</p>';
        });
      } else {
        wcc.innerHTML = '<div class="empty-state">Word cloud unavailable</div>';
      }
    });
  });
})();
</script>
</body>
</html>
