<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Chart</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#f5f3f0;color:#3d3a36;font-size:13px;line-height:1.5}

.toolbar{display:flex;align-items:center;background:#fff;border-bottom:1px solid #e8e4df;padding:0 16px;height:44px}
.brand{font-size:15px;font-weight:600;color:#5a4e3c;margin-right:20px;white-space:nowrap}
.brand span{font-weight:400;color:#a09788}
.toolbar form{display:flex;align-items:center;gap:8px;flex:1}
.sep{width:1px;height:22px;background:#e8e4df;flex-shrink:0}
.toolbar label{font-size:11px;color:#9b9185;white-space:nowrap;flex-shrink:0}
.toolbar input,.toolbar select{padding:4px 8px;border:1px solid #ddd8d1;border-radius:3px;background:#fcfbf9;color:#3d3a36;font-size:12px;font-family:inherit}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:#b09e82}
.toolbar input[type="date"]{width:145px}
.toolbar input[type="time"]{width:115px}
.toolbar input[type="text"]{width:160px}
.toolbar select{width:90px}
.btn-calc{padding:5px 16px;border:none;border-radius:3px;background:#8b7355;color:#fff;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap}
.btn-calc:hover{background:#7a644a}
.btn-calc:disabled{opacity:.4;cursor:not-allowed}

.error-bar{background:#fdf2f2;border-bottom:1px solid #e8c4c4;color:#9b4d4d;padding:6px 16px;font-size:12px;display:none}
.meta-bar{display:flex;gap:16px;padding:5px 16px;background:#faf8f5;border-bottom:1px solid #e8e4df;flex-wrap:wrap}
.meta-item{font-size:11px;color:#9b9185}
.meta-item b{color:#5a4e3c;font-weight:500}

.page{display:none;padding:10px 16px}
.page.active{display:block}

.row{display:grid;grid-template-columns:2fr 1fr;gap:10px}
.card{background:#fff;border:1px solid #e8e4df;border-radius:5px;overflow:hidden;display:flex;flex-direction:column;height:640px}

.card-hdr{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;background:#faf8f5;border-bottom:1px solid #e8e4df;flex-shrink:0}
.card-hdr-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#9b9185}
.copy-btn{padding:2px 9px;border:1px solid #ddd8d1;border-radius:3px;background:#fff;color:#8b7355;font-size:10px;cursor:pointer;font-family:inherit}
.copy-btn:hover{background:#ece7df}

.card-body{flex:1;overflow:auto;min-height:0;position:relative}

canvas{display:block;width:100%;height:100%}

.filter-bar{display:flex;align-items:center;gap:10px;padding:5px 10px;background:#fcfbf9;border-bottom:1px solid #f0ece7;flex-wrap:wrap;font-size:11px;color:#6b6358}
.filter-bar label{font-size:10px;color:#9b9185;text-transform:uppercase;letter-spacing:.04em}
.filter-bar input[type="range"]{width:90px;accent-color:#8b7355}
.filter-bar .orb-val{font-variant-numeric:tabular-nums;color:#5a4e3c;min-width:28px;text-align:right}
.asp-menu{position:relative}
.asp-toggle{padding:2px 8px;border:1px solid #ddd8d1;border-radius:3px;background:#fff;color:#5a4e3c;font-size:11px;cursor:pointer;font-family:inherit}
.asp-toggle:hover{background:#f5efe6}
.asp-pop{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid #ddd8d1;border-radius:4px;box-shadow:0 4px 14px rgba(60,50,30,.12);padding:6px 8px;z-index:10;min-width:180px;max-height:260px;overflow:auto}
.asp-pop.open{display:block}
.asp-pop label{display:flex;align-items:center;gap:6px;padding:3px 2px;font-size:11px;color:#5a4e3c;text-transform:none;letter-spacing:0;cursor:pointer}
.asp-pop label:hover{background:#faf6ee}
.asp-pop input[type="checkbox"]{accent-color:#8b7355}
.asp-pop .asp-glyph{display:inline-block;width:14px;text-align:center;color:#8b7355}

.gear-btn{padding:2px 7px;border:1px solid #ddd8d1;border-radius:3px;background:#fff;color:#5a4e3c;font-size:13px;cursor:pointer;font-family:inherit;line-height:1}
.gear-btn:hover{background:#f5efe6}
.settings-panel{display:none;border-bottom:1px solid #f0ece7;background:#fcfbf9;padding:8px 10px;font-size:11px;color:#5a4e3c}
.settings-panel.open{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 16px}
.settings-panel .grp{display:flex;flex-direction:column;gap:3px}
.settings-panel .grp-wide{grid-column:1/-1}
.settings-panel .grp-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#9b9185}
.settings-panel .grp-title-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.settings-panel .grp-mini{font-size:9px;padding:1px 6px;border:1px solid #ddd8d1;background:#fff;color:#8b7355;border-radius:3px;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.settings-panel .grp-mini:hover{background:#f5efe6;color:#5a4e3c}
.settings-panel .grp-flow{display:flex;flex-wrap:wrap;gap:2px 14px}
.settings-panel .grp-flow label{flex:0 0 auto}
.settings-panel .grp label{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;color:#5a4e3c;text-transform:none;letter-spacing:0}
.settings-panel .grp label:hover{color:#3d3a36}
.settings-panel input[type="checkbox"]{accent-color:#8b7355}
.settings-panel select{padding:2px 5px;border:1px solid #ddd8d1;border-radius:3px;background:#fff;color:#5a4e3c;font-size:11px;font-family:inherit;width:fit-content}
.asp-pop-hdr{display:flex;align-items:center;justify-content:space-between;padding:2px 2px 4px;border-bottom:1px solid #f0ece7;margin-bottom:3px;gap:6px}
.asp-pop-hdr-btns{display:flex;gap:4px}
.asp-pop-hdr-btns button{font-size:9px;padding:1px 6px;border:1px solid #ddd8d1;background:#fff;color:#8b7355;border-radius:3px;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.asp-pop-hdr-btns button:hover{background:#f5efe6;color:#5a4e3c}

.info-box{padding:4px 8px;font-size:10px;line-height:1.6;font-family:'Menlo','Consolas','Courier New',monospace;white-space:pre-wrap;word-break:break-word;user-select:text}
.s-hdr{color:#b09e82;font-size:9px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #f0ece7;margin-top:4px;margin-bottom:1px;padding-bottom:1px}
.retro{color:#c0392b}
.asp-line{color:#7a6e65}

.empty-page{display:flex;align-items:center;justify-content:center;height:calc(100vh - 60px);color:#c4bdb4;font-size:14px}
.loading{display:none;text-align:center;padding:40px;color:#9b9185}
.loading::before{content:'';display:inline-block;width:16px;height:16px;border:2px solid #e8e4df;border-top-color:#8b7355;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:900px){.row{grid-template-columns:1fr}.card{height:540px}}
@media(max-width:650px){.toolbar{height:auto;padding:8px 12px;flex-wrap:wrap;gap:6px}.toolbar form{flex-wrap:wrap}.sep{display:none}.toolbar input[type="date"],.toolbar input[type="time"],.toolbar input[type="text"],.toolbar select{width:100%}}
</style>
</head>
<body>

<div class="toolbar">
  <div class="brand">Astro<span>Chart</span></div>
  <form id="chart-form">
    <label>Date</label><input type="date" id="birth-date" required>
    <div class="sep"></div>
    <label>Time</label><input type="time" id="birth-time" step="60" required>
    <div class="sep"></div>
    <label>Place</label><input type="text" id="location" placeholder="City, Country" required>
    <div class="sep"></div>
    <label>System</label>
    <select id="zodiac"><option value="Tropical">Tropical</option><option value="Sidereal">Sidereal</option></select>
    <button type="submit" class="btn-calc" id="submit-btn">Calculate</button>
  </form>
</div>

<div id="error-bar" class="error-bar"></div>
<div class="loading" id="spinner">Calculating chart...</div>
<div id="empty-state" class="empty-page">Enter birth details above to generate your natal chart</div>

<div id="results" class="page">
  <div id="meta-bar" class="meta-bar"></div>
  <div style="padding:8px 0">
    <div class="row">
      <div class="card">
        <div class="card-hdr"><span class="card-hdr-title">Chart Wheel</span></div>
        <div class="filter-bar">
          <label>Aspects</label>
          <div class="asp-menu">
            <button type="button" class="asp-toggle" id="asp-toggle">All majors &#9662;</button>
            <div class="asp-pop" id="asp-pop"></div>
          </div>
          <div class="sep" style="height:14px"></div>
          <button type="button" class="gear-btn" id="gear-btn" title="More settings">&#9881;</button>
        </div>
        <div class="settings-panel" id="settings-panel">
          <div class="grp grp-wide">
            <div class="grp-title-row">
              <div class="grp-title">Display</div>
              <button type="button" class="grp-mini" data-bulk="disp" data-bulk-state="all">All</button>
              <button type="button" class="grp-mini" data-bulk="disp" data-bulk-state="none">None</button>
            </div>
            <div class="grp-flow">
              <label><input type="checkbox" data-disp-name="Sun" checked> Sun</label>
              <label><input type="checkbox" data-disp-name="Moon" checked> Moon</label>
              <label><input type="checkbox" data-disp-name="Mercury" checked> Mercury</label>
              <label><input type="checkbox" data-disp-name="Venus" checked> Venus</label>
              <label><input type="checkbox" data-disp-name="Mars" checked> Mars</label>
              <label><input type="checkbox" data-disp-name="Jupiter" checked> Jupiter</label>
              <label><input type="checkbox" data-disp-name="Saturn" checked> Saturn</label>
              <label><input type="checkbox" data-disp-name="Uranus" checked> Uranus</label>
              <label><input type="checkbox" data-disp-name="Neptune" checked> Neptune</label>
              <label><input type="checkbox" data-disp-name="Pluto" checked> Pluto</label>
              <label><input type="checkbox" data-disp="Chiron"> Chiron</label>
              <label><input type="checkbox" data-disp="Nodes"> Lunar Nodes</label>
              <label><input type="checkbox" data-disp="Angles"> Angles (Asc/MC)</label>
              <label><input type="checkbox" data-disp="Points"> Vertex &amp; Fortune</label>
            </div>
          </div>
          <div class="grp">
            <div class="grp-title-row">
              <div class="grp-title">Aspects to</div>
              <button type="button" class="grp-mini" data-bulk="aspto" data-bulk-state="all">All</button>
              <button type="button" class="grp-mini" data-bulk="aspto" data-bulk-state="none">None</button>
            </div>
            <label><input type="checkbox" data-aspto="Chiron"> Chiron</label>
            <label><input type="checkbox" data-aspto="Nodes"> Lunar Nodes</label>
            <label><input type="checkbox" data-aspto="Angles"> ASC &amp; MC</label>
            <label><input type="checkbox" data-aspto="Points"> Vertex &amp; Fortune</label>
          </div>
          <div class="grp">
            <div class="grp-title">Orbs</div>
            <div style="display:flex;align-items:center;gap:5px;margin-bottom:5px">
              <span style="font-size:11px;min-width:34px">Major</span>
              <input type="number" id="major-orb-val" value="100" min="10" max="200" step="10" style="width:52px;font-size:12px">
              <select id="orb-type" style="font-size:12px">
                <option value="pct" selected>% of max</option>
                <option value="deg">° fixed</option>
              </select>
            </div>
            <div style="display:flex;align-items:center;gap:5px">
              <span style="font-size:11px;min-width:34px">Minor</span>
              <input type="number" id="minor-orb-val" value="50" min="10" max="200" step="10" style="width:52px;font-size:12px">
            </div>
          </div>
          <div class="grp">
            <div class="grp-title">House system</div>
            <select id="house-system" title="Tropical only — Sidereal always uses Whole Sign">
              <option value="Koch" selected>Koch</option>
              <option value="Placidus">Placidus</option>
              <option value="Whole Sign">Whole Sign</option>
              <option value="Equal">Equal</option>
              <option value="Porphyry">Porphyry</option>
              <option value="Regiomontanus">Regiomontanus</option>
              <option value="Campanus">Campanus</option>
            </select>
          </div>
        </div>
        <div class="card-body"><canvas id="wheel-canvas"></canvas></div>
      </div>
      <div class="card">
        <div class="card-hdr">
          <span class="card-hdr-title">Positions &amp; Aspects</span>
          <button class="copy-btn" onclick="copyInfo()">Copy</button>
        </div>
        <div class="card-body"><div class="info-box" id="info-box"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Wheel drawing ────────────────────────────────────────────────────────────
var SIGN_SYMBOLS = ['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
var SIGN_NAMES_W = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
// Element-tinted glyphs: Fire=red, Earth=green, Air=amber, Water=blue
var SIGN_GLYPH_COLS = ['#c0392b','#3a8a3a','#d4a017','#2e7e9e','#c0392b','#3a8a3a','#d4a017','#2e7e9e','#c0392b','#3a8a3a','#d4a017','#2e7e9e'];
var NAK_NAMES = ['Ashw','Bhar','Krit','Rohi','Mrig','Ardr','Puna','Push','Ashl','Magh','PPha','UPha','Hast','Chit','Swat','Vish','Anur','Jyes','Mool','PAsh','UAsh','Shra','Dhan','Shat','PBha','UBha','Reva'];

// Aspect catalog. major=true for the 5 major aspects, positive=true for harmonious.
var ASP_TYPES = [
  {name:'Conjunction',  sym:'☌',  major:true,  positive:false, defaultOn:true},
  {name:'Opposition',   sym:'☍',  major:true,  positive:false, defaultOn:true},
  {name:'Trine',        sym:'△',  major:true,  positive:true,  defaultOn:true},
  {name:'Square',       sym:'□',  major:true,  positive:false, defaultOn:true},
  {name:'Sextile',      sym:'✶',  major:true,  positive:true,  defaultOn:true},
  {name:'Quincunx',     sym:'⚻',  major:false, positive:false, defaultOn:false},
  {name:'Semi-sextile', sym:'⚹',  major:false, positive:true,  defaultOn:false},
  {name:'Semi-square',  sym:'∠',  major:false, positive:false, defaultOn:false},
  {name:'Sesquisquare', sym:'Sq', major:false, positive:false, defaultOn:false},
  {name:'Quintile',     sym:'⚼',  major:false, positive:true,  defaultOn:false},
  {name:'Bi-Quintile',  sym:'bQ', major:false, positive:true,  defaultOn:false},
  {name:'Septile',      sym:'⚤',  major:false, positive:false, defaultOn:false},
  {name:'Novile',       sym:'⭘',  major:false, positive:true,  defaultOn:false},
  {name:'Decile',       sym:'⭑',  major:false, positive:true,  defaultOn:false},
  {name:'Undecile',     sym:'⭒',  major:false, positive:true,  defaultOn:false}
];
// major-neg=red, major-pos=green, minor-neg=orange, minor-pos=seagreen
function aspLineColor(meta) {
  if (!meta) return '#999';
  if (meta.major  && !meta.positive) return '#c0392b';
  if (meta.major  &&  meta.positive) return '#27ae60';
  if (!meta.major && !meta.positive) return '#e67e22';
  return '#1e8449';
}

// Display toggles. Per-planet keys default to true; group keys default to false.
// Unchecking a body hides its symbol and any aspect lines involving it.
var PLANET_NAMES = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
var BODY_DISPLAY = {
  Sun:true, Moon:true, Mercury:true, Venus:true, Mars:true,
  Jupiter:true, Saturn:true, Uranus:true, Neptune:true, Pluto:true,
  Chiron:false, Nodes:false, Angles:false, Points:false
};
var ASPECT_TO    = {Chiron:false, Nodes:false, Angles:false, Points:false};
var ORB_TYPE = 'pct';
var MAJOR_ORB_VAL = 100;
var MINOR_ORB_VAL = 50;
var NODE_NAMES  = ['North Node','South Node','True Node','Mean Node','Rahu','Ketu'];
var ANGLE_NAMES = ['Asc','Desc','MC','IC'];
var POINT_NAMES = ['Vertex','Fortune'];

function bodyGroup(name) {
  if (name === 'Chiron') return 'Chiron';
  if (NODE_NAMES.indexOf(name) !== -1) return 'Nodes';
  if (ANGLE_NAMES.indexOf(name) !== -1) return 'Angles';
  if (POINT_NAMES.indexOf(name) !== -1) return 'Points';
  return null;
}

// Filter state. ASP_FILTER[name] = bool.
var ASP_FILTER = {};
ASP_TYPES.forEach(function(a){ ASP_FILTER[a.name] = a.defaultOn; });

// Latest chart data, kept so filter changes can re-render without re-fetching.
var LAST_DATA = null;

function drawWheel(data) {
  if (!data) return;
  var cvs = document.getElementById('wheel-canvas');
  var parent = cvs.parentElement;
  var dpr = window.devicePixelRatio || 1;
  var W = parent.clientWidth, H = parent.clientHeight;
  cvs.width = W * dpr; cvs.height = H * dpr;
  cvs.style.width = W + 'px'; cvs.style.height = H + 'px';

  var ctx = cvs.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);

  var cx = W / 2, cy = H / 2;
  var isSid = data.zodiac_system === 'Sidereal';

  // Radii (outer to inner).
  var outerPad = isSid ? 26 : 6;
  var R   = Math.min(cx, cy) - outerPad;
  var rTickOut = R;
  var r4      = R * 0.93;  // sign ring outer
  var r3      = R * 0.78;  // sign ring inner / merged ring outer
  var rPl_sym = R * 0.71;  // planet symbol in merged ring
  var rPl_lbl = R * 0.62;  // degree label in merged ring
  var r1      = R * 0.44;  // aspect circle / merged ring inner

  // Rotation: Desc at right (3 o'clock), Asc at left (9 o'clock).
  var desc = data.bodies.find(function(b){ return b.Body === 'Desc'; });
  var rotLon = desc ? desc['Longitude (°)'] : 0;
  function lon2a(lon) { return -(lon - rotLon) * Math.PI / 180; }
  function pt(r, a) { return [cx + r * Math.cos(a), cy + r * Math.sin(a)]; }

  // ── canvas background
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  // ── zodiac sign band (white cells, hairline separators, element-tinted names)
  for (var i = 0; i < 12; i++) {
    var sa1 = lon2a(i * 30);
    var sa2 = lon2a((i + 1) * 30);
    ctx.beginPath();
    ctx.arc(cx, cy, r4, sa1, sa2, true);
    ctx.arc(cx, cy, r3, sa2, sa1, false);
    ctx.closePath();
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = '#888'; ctx.lineWidth = 0.6; ctx.stroke();

    var midA = lon2a(i * 30 + 15);
    var mr = (r4 + r3) / 2;
    var sgp = pt(mr, midA);
    ctx.save();
    ctx.translate(sgp[0], sgp[1]);
    ctx.rotate(midA + Math.PI / 2);
    ctx.font = '600 ' + Math.round(R * 0.038) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = SIGN_GLYPH_COLS[i];
    ctx.fillText(SIGN_NAMES_W[i], 0, 0);
    ctx.restore();
  }

  // ── degree tick marks (outside the sign band)
  for (var dt = 0; dt < 360; dt++) {
    var ta = lon2a(dt);
    var inner = (dt % 10 === 0) ? r4 - R*0.025
              : (dt % 5  === 0) ? r4 - R*0.014
                                 : r4 - R*0.007;
    var tp1 = pt(inner, ta), tp2 = pt(rTickOut, ta);
    ctx.beginPath();
    ctx.moveTo(tp1[0], tp1[1]); ctx.lineTo(tp2[0], tp2[1]);
    ctx.strokeStyle = (dt % 10 === 0) ? '#444' : (dt % 5 === 0 ? '#888' : '#bbb');
    ctx.lineWidth   = (dt % 10 === 0) ? 0.7   : 0.4;
    ctx.stroke();
  }

  // ── nakshatra ring (sidereal only)
  if (isSid) {
    var nakSpan = 360 / 27;
    var nakR = R + outerPad - 4;
    var nakInner = rTickOut + 2;
    for (var ni = 0; ni < 27; ni++) {
      var na1 = lon2a(ni * nakSpan);
      var na2 = lon2a((ni + 1) * nakSpan);
      ctx.beginPath();
      ctx.arc(cx, cy, nakR, na1, na2, true);
      ctx.arc(cx, cy, nakInner, na2, na1, false);
      ctx.closePath();
      ctx.fillStyle = ni % 2 === 0 ? '#fdf8f2' : '#f5efe6';
      ctx.fill();
      ctx.strokeStyle = '#e8e0d5'; ctx.lineWidth = 0.3; ctx.stroke();

      var nMid = lon2a(ni * nakSpan + nakSpan / 2);
      var nMr = (nakR + nakInner) / 2;
      var np = pt(nMr, nMid);
      ctx.save();
      ctx.translate(np[0], np[1]);
      ctx.rotate(nMid + Math.PI / 2);
      ctx.font = Math.round(R * 0.042) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#8b7355';
      ctx.fillText(NAK_NAMES[ni], 0, 0);
      ctx.restore();
    }
  }

  // ── merged ring inner edge (aspect circle)
  ctx.beginPath(); ctx.arc(cx, cy, r1, 0, 2*Math.PI);
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 0.5; ctx.stroke();

  // ── house cusp tick lines (r1 -> r3)
  var cusps = data.bodies.filter(function(b){ return b.Body.indexOf('House Cusp') !== -1; });
  cusps.forEach(function(c) {
    var ca = lon2a(c['Longitude (°)']);
    var cp1 = pt(r1, ca), cp2 = pt(r3, ca);
    ctx.beginPath();
    ctx.moveTo(cp1[0], cp1[1]); ctx.lineTo(cp2[0], cp2[1]);
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = 0.5; ctx.stroke();
  });

  // ── house numbers in the house band
  var sorted = cusps.slice().sort(function(a,b){ return a['Longitude (°)'] - b['Longitude (°)']; });
  for (var hi = 0; hi < sorted.length; hi++) {
    var l1 = sorted[hi]['Longitude (°)'];
    var l2 = sorted[(hi+1) % sorted.length]['Longitude (°)'];
    if (l2 <= l1) l2 += 360;
    var hMid = lon2a((l1 + l2) / 2);
    var hR = r1 + R * 0.055;
    var hp = pt(hR, hMid);
    ctx.font = Math.round(R * 0.05) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#888';
    ctx.fillText(String(hi + 1), hp[0], hp[1]);
  }

  // ── Asc / Desc / MC / IC axes (bold black, span r1 to outer rim)
  if (BODY_DISPLAY.Angles) ['Asc','Desc','MC','IC'].forEach(function(name) {
    var b = data.bodies.find(function(x){ return x.Body === name; });
    if (!b) return;
    var aa = lon2a(b['Longitude (°)']);
    var ap1 = pt(r1, aa), ap2 = pt(rTickOut, aa);
    ctx.beginPath();
    ctx.moveTo(ap1[0], ap1[1]); ctx.lineTo(ap2[0], ap2[1]);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.4; ctx.stroke();

    var lp = pt(r3 - R*0.025, aa);
    ctx.font = 'bold ' + Math.round(R * 0.04) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#222';
    ctx.fillText(name, lp[0], lp[1]);
  });

  // ── planets in merged ring — bold, radially rotated, stacked inward for clusters
  var planets = data.bodies.filter(function(b){
    if (!b.Symbol || b.Body.indexOf('House') !== -1) return false;
    if (ANGLE_NAMES.indexOf(b.Body) !== -1) return false;
    if (BODY_DISPLAY.hasOwnProperty(b.Body) && !BODY_DISPLAY[b.Body]) return false;
    var grp = bodyGroup(b.Body);
    if (grp && !BODY_DISPLAY[grp]) return false;
    return true;
  }).slice().sort(function(a,b){ return a['Longitude (°)'] - b['Longitude (°)']; });

  var clusterDeg = 6, rShift = R * 0.075;
  var lastLon = -1e9, lastShift = 0;
  var placements = planets.map(function(p) {
    var lon = p['Longitude (°)'];
    var shift = (lon - lastLon < clusterDeg) ? Math.min(lastShift + 1, 3) : 0;
    lastLon = lon; lastShift = shift;
    return { p: p, rSym: Math.max(r1 + R*0.06, rPl_sym - shift * rShift), a: lon2a(lon) };
  });
  placements.forEach(function(it){
    var t1 = pt(r3, it.a), t2 = pt(it.rSym + R*0.038, it.a);
    ctx.beginPath(); ctx.moveTo(t1[0], t1[1]); ctx.lineTo(t2[0], t2[1]);
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.5; ctx.stroke();
  });
  placements.forEach(function(it) {
    var p = it.p, a = it.a;
    var ssp = pt(it.rSym, a);
    ctx.save();
    ctx.translate(ssp[0], ssp[1]);
    ctx.rotate(a + Math.PI / 2);
    ctx.font = 'bold ' + Math.round(R * 0.088) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#000';
    ctx.fillText(p.Symbol, 0, 0);
    ctx.restore();
    var dd = p['Longitude (°)'] % 30;
    var deg = Math.floor(dd), mn = Math.floor((dd - deg) * 60);
    var lbl = deg + '°' + (mn < 10 ? '0' : '') + mn + "'";
    if (p.Motion === 'R') lbl += ' R';
    var lbp = pt(it.rSym - R*0.095, a);
    ctx.save();
    ctx.translate(lbp[0], lbp[1]);
    ctx.rotate(a + Math.PI / 2);
    ctx.font = Math.round(R * 0.032) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = p.Motion === 'R' ? '#c0392b' : '#444';
    ctx.fillText(lbl, 0, 0);
    ctx.restore();
  });

  // ── aspect lines (filtered by orb type, major/minor thresholds, and body toggles)
  var posMap = {};
  data.bodies.forEach(function(b){ posMap[b.Body] = lon2a(b['Longitude (°)']); });

  var aspects = (data.aspects || []).filter(function(a) {
    if (!ASP_FILTER[a.Aspect]) return false;
    // Per-body display: hidden bodies hide their aspect lines
    if (BODY_DISPLAY.hasOwnProperty(a.Body1) && !BODY_DISPLAY[a.Body1]) return false;
    if (BODY_DISPLAY.hasOwnProperty(a.Body2) && !BODY_DISPLAY[a.Body2]) return false;
    var g1 = bodyGroup(a.Body1), g2 = bodyGroup(a.Body2);
    if ((g1 && !ASPECT_TO[g1]) || (g2 && !ASPECT_TO[g2])) return false;
    var meta2 = ASP_TYPES.find(function(t){ return t.name === a.Aspect; });
    var isMajor = meta2 ? meta2.major : true;
    var val = isMajor ? MAJOR_ORB_VAL : MINOR_ORB_VAL;
    var orbDelta = (a.Orb != null && a.Closeness != null)
      ? (1 - a.Closeness) * a.Orb
      : Math.abs((a.Angle || 0) - (a.Degrees || 0));
    if (ORB_TYPE === 'pct') return a.Orb != null ? (orbDelta / a.Orb * 100 <= val) : (orbDelta <= 6);
    return orbDelta <= val;
  });

  aspects.forEach(function(asp) {
    var a1 = posMap[asp.Body1], a2 = posMap[asp.Body2];
    if (a1 == null || a2 == null) return;
    var meta = ASP_TYPES.find(function(t){ return t.name === asp.Aspect; });
    var closeness = asp.Closeness || 0.5;
    var ep1 = pt(r1, a1), ep2 = pt(r1, a2);
    ctx.beginPath();
    ctx.moveTo(ep1[0], ep1[1]); ctx.lineTo(ep2[0], ep2[1]);
    ctx.strokeStyle = aspLineColor(meta);
    ctx.lineWidth = Math.max(0.4, closeness * 2.5);
    ctx.globalAlpha = 0.25 + closeness * 0.75;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });
}

// ─── Info box ─────────────────────────────────────────────────────────────────
function signDeg(lon) {
  if (lon == null) return '';
  var d = lon % 30, deg = Math.floor(d), mn = Math.floor((d - deg) * 60);
  return deg + '°' + (mn < 10 ? '0' : '') + mn + "'";
}
function fmtDeg(d) {
  if (d == null) return '';
  var deg = Math.floor(d), mn = Math.floor((d - deg) * 60);
  return deg + '°' + (mn < 10 ? '0' : '') + mn + "'";
}

function buildInfoBox(d) {
  var isSid = d.zodiac_system === 'Sidereal';
  var planets = d.bodies.filter(function(x){
    return x.Body && x.Body.indexOf('House') === -1 &&
      ANGLE_NAMES.indexOf(x.Body) === -1 &&
      POINT_NAMES.indexOf(x.Body) === -1;
  });
  var angles  = d.bodies.filter(function(x){ return ANGLE_NAMES.indexOf(x.Body) !== -1; });
  var points  = d.bodies.filter(function(x){ return POINT_NAMES.indexOf(x.Body) !== -1; });
  var houses  = d.bodies.filter(function(x){ return x.Body && x.Body.indexOf('House Cusp') !== -1; });

  var html = '<div class="s-hdr">Planets</div>';
  planets.forEach(function(p) {
    var sym    = p.Symbol || '';
    var motion = p.Motion === 'R' ? '<span class="retro"> (R)</span>' : ' (D)';
    var house  = p.House ? ' • H' + p.House : '';
    var nak    = (isSid && p.Nakshatra) ? ' • ' + p.Nakshatra + ' P' + p.Pada : '';
    html += sym + ' ' + p.Body + motion + '  ' + p.Sign + ' ' + signDeg(p['Longitude (°)']) + house + nak + '\n';
  });

  if (angles.length) {
    html += '<div class="s-hdr">Angles</div>';
    angles.forEach(function(a){ html += a.Body + '  ' + a.Sign + ' ' + signDeg(a['Longitude (°)']) + '\n'; });
  }
  if (points.length) {
    html += '<div class="s-hdr">Points</div>';
    points.forEach(function(p){
      var sym = p.Symbol ? p.Symbol + ' ' : '';
      var house = p.House ? ' • H' + p.House : '';
      html += sym + p.Body + '  ' + p.Sign + ' ' + signDeg(p['Longitude (°)']) + house + '\n';
    });
  }
  if (houses.length) {
    html += '<div class="s-hdr">Houses</div>';
    houses.forEach(function(h){
      html += h.Body.replace('House Cusp ','H') + '  ' + h.Sign + ' ' + signDeg(h['Longitude (°)']) + '\n';
    });
  }
  if (d.aspects && d.aspects.length) {
    html += '<div class="s-hdr">Aspects (' + d.aspects.length + ')</div>';
    d.aspects.forEach(function(a){
      var orb = (a.Angle != null && a.Degrees != null) ? fmtDeg(Math.abs(a.Angle - a.Degrees)) : '';
      html += '<span class="asp-line">' + a.Body1 + ' ' + (a.aspect_symbol||'') + ' ' + a.Body2 + '  ' + a.Aspect + (orb ? '  orb ' + orb : '') + '</span>\n';
    });
  }
  document.getElementById('info-box').innerHTML = html;
}

function copyInfo() {
  var txt = document.getElementById('info-box').innerText;
  navigator.clipboard.writeText(txt).then(function(){
    var b = document.querySelector('.copy-btn');
    b.textContent = 'Copied!';
    setTimeout(function(){ b.textContent = 'Copy'; }, 1500);
  });
}

// ─── Meta bar ────────────────────────────────────────────────────────────────
function buildMeta(d) {
  var items = [['Location',d.location],['Timezone',d.moment.timezone],['System',d.zodiac_system],
    ['Coords', d.moment.latitude.toFixed(4)+', '+d.moment.longitude.toFixed(4)]];
  if (d.ayanamsa != null) items.push(['Ayanamsa', fmtDeg(d.ayanamsa)]);
  document.getElementById('meta-bar').innerHTML = items.map(function(x){
    return '<div class="meta-item">'+x[0]+': <b>'+x[1]+'</b></div>';
  }).join('');
}

// ─── Filter controls ─────────────────────────────────────────────────────────
function updateAspToggleLabel() {
  var on = ASP_TYPES.filter(function(t){ return ASP_FILTER[t.name]; });
  var lbl;
  if (on.length === 0) lbl = 'None';
  else if (on.length === ASP_TYPES.length) lbl = 'All';
  else if (on.length <= 3) lbl = on.map(function(t){ return t.name; }).join(', ');
  else lbl = on.length + ' selected';
  document.getElementById('asp-toggle').innerHTML = lbl + ' ▾';
}

(function initFilters(){
  var pop = document.getElementById('asp-pop');
  var popHdr =
    '<div class="asp-pop-hdr">' +
      '<span style="font-size:9px;color:#9b9185;text-transform:uppercase;letter-spacing:.05em">Aspect types</span>' +
      '<div class="asp-pop-hdr-btns">' +
        '<button type="button" data-asp-bulk="all">All</button>' +
        '<button type="button" data-asp-bulk="none">None</button>' +
      '</div>' +
    '</div>';
  pop.innerHTML = popHdr + ASP_TYPES.map(function(t, i){
    var checked = ASP_FILTER[t.name] ? 'checked' : '';
    return '<label><input type="checkbox" data-asp="' + t.name + '" ' + checked +
           '><span class="asp-glyph">' + t.sym + '</span>' + t.name + '</label>';
  }).join('');

  pop.addEventListener('change', function(e){
    var cb = e.target;
    if (cb && cb.matches('input[type="checkbox"]')) {
      ASP_FILTER[cb.dataset.asp] = cb.checked;
      updateAspToggleLabel();
      if (LAST_DATA) drawWheel(LAST_DATA);
    }
  });

  // Asp pop All / None bulk toggles
  pop.addEventListener('click', function(e){
    var b = e.target.closest('button[data-asp-bulk]');
    if (!b) return;
    e.stopPropagation();
    var on = b.dataset.aspBulk === 'all';
    pop.querySelectorAll('input[data-asp]').forEach(function(cb){
      cb.checked = on;
      ASP_FILTER[cb.dataset.asp] = on;
    });
    updateAspToggleLabel();
    if (LAST_DATA) drawWheel(LAST_DATA);
  });

  var toggle = document.getElementById('asp-toggle');
  toggle.addEventListener('click', function(e){
    e.stopPropagation();
    pop.classList.toggle('open');
  });
  document.addEventListener('click', function(e){
    if (!pop.contains(e.target) && e.target !== toggle) pop.classList.remove('open');
  });

  // Gear: toggle the extended settings panel.
  var gear = document.getElementById('gear-btn');
  var panel = document.getElementById('settings-panel');
  gear.addEventListener('click', function(){
    panel.classList.toggle('open');
    if (LAST_DATA) requestAnimationFrame(function(){ drawWheel(LAST_DATA); });
  });

  // Display + Aspects-to checkboxes. Unchecking Display unchecks Aspects-to;
  // checking Aspects-to auto-checks the matching Display item.
  panel.addEventListener('change', function(e){
    var cb = e.target;
    if (!cb || cb.tagName !== 'INPUT' || cb.type !== 'checkbox') return;
    if (cb.dataset.dispName) {
      BODY_DISPLAY[cb.dataset.dispName] = cb.checked;
    }
    if (cb.dataset.disp) {
      var key = cb.dataset.disp;
      BODY_DISPLAY[key] = cb.checked;
      if (!cb.checked) {
        ASPECT_TO[key] = false;
        var aspCb = panel.querySelector('input[data-aspto="' + key + '"]');
        if (aspCb) aspCb.checked = false;
      }
    }
    if (cb.dataset.aspto) {
      var k = cb.dataset.aspto;
      ASPECT_TO[k] = cb.checked;
      if (cb.checked) {
        BODY_DISPLAY[k] = true;
        var dispCb = panel.querySelector('input[data-disp="' + k + '"]');
        if (dispCb) dispCb.checked = true;
      }
    }
    if (LAST_DATA) drawWheel(LAST_DATA);
  });

  // Display / Aspects-to bulk All / None buttons.
  panel.addEventListener('click', function(e){
    var b = e.target.closest('button[data-bulk]');
    if (!b) return;
    var bulk = b.dataset.bulk, on = b.dataset.bulkState === 'all';
    if (bulk === 'disp') {
      panel.querySelectorAll('input[data-disp-name]').forEach(function(cb){
        cb.checked = on;
        BODY_DISPLAY[cb.dataset.dispName] = on;
      });
      panel.querySelectorAll('input[data-disp]').forEach(function(cb){
        cb.checked = on;
        BODY_DISPLAY[cb.dataset.disp] = on;
        if (!on) {
          ASPECT_TO[cb.dataset.disp] = false;
          var aspCb = panel.querySelector('input[data-aspto="' + cb.dataset.disp + '"]');
          if (aspCb) aspCb.checked = false;
        }
      });
    } else if (bulk === 'aspto') {
      panel.querySelectorAll('input[data-aspto]').forEach(function(cb){
        cb.checked = on;
        ASPECT_TO[cb.dataset.aspto] = on;
        if (on) {
          BODY_DISPLAY[cb.dataset.aspto] = true;
          var dispCb = panel.querySelector('input[data-disp="' + cb.dataset.aspto + '"]');
          if (dispCb) dispCb.checked = true;
        }
      });
    }
    if (LAST_DATA) drawWheel(LAST_DATA);
  });

  // Major / minor orb inputs + type selector.
  function bindOrb(id, setter, fallback) {
    var el = document.getElementById(id);
    function update() {
      var v = parseFloat(el.value);
      setter(isFinite(v) ? v : fallback);
      if (LAST_DATA) drawWheel(LAST_DATA);
    }
    el.addEventListener('input', update);
    el.addEventListener('change', update);
  }
  bindOrb('major-orb-val', function(v){ MAJOR_ORB_VAL = v; }, 100);
  bindOrb('minor-orb-val', function(v){ MINOR_ORB_VAL = v; }, 50);

  // Switching units adjusts both inputs to mode-appropriate defaults.
  document.getElementById('orb-type').addEventListener('change', function(){
    ORB_TYPE = this.value;
    var maj = document.getElementById('major-orb-val');
    var mn  = document.getElementById('minor-orb-val');
    if (ORB_TYPE === 'deg') {
      maj.min = '0.5'; maj.max = '15'; maj.step = '0.5'; maj.value = '6';
      mn.min  = '0.5'; mn.max  = '15'; mn.step  = '0.5'; mn.value  = '3';
      MAJOR_ORB_VAL = 6; MINOR_ORB_VAL = 3;
    } else {
      maj.min = '10'; maj.max = '200'; maj.step = '10'; maj.value = '100';
      mn.min  = '10'; mn.max  = '200'; mn.step  = '10'; mn.value  = '50';
      MAJOR_ORB_VAL = 100; MINOR_ORB_VAL = 50;
    }
    if (LAST_DATA) drawWheel(LAST_DATA);
  });

  // House system: requires a server round-trip — re-submit the form.
  document.getElementById('house-system').addEventListener('change', function(){
    if (LAST_DATA) document.getElementById('chart-form').requestSubmit();
  });

  // Switching to Sidereal forces Whole Sign houses (Vedic convention).
  document.getElementById('zodiac').addEventListener('change', function(){
    if (this.value === 'Sidereal') {
      document.getElementById('house-system').value = 'Whole Sign';
    }
  });

  updateAspToggleLabel();

  window.addEventListener('resize', function(){
    if (LAST_DATA) requestAnimationFrame(function(){ drawWheel(LAST_DATA); });
  });
})();

// ─── Form submit ─────────────────────────────────────────────────────────────
(function(){
  var form    = document.getElementById('chart-form');
  var spinner = document.getElementById('spinner');
  var results = document.getElementById('results');
  var empty   = document.getElementById('empty-state');
  var errBar  = document.getElementById('error-bar');
  var btn     = document.getElementById('submit-btn');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    errBar.style.display = 'none';
    results.classList.remove('active');
    empty.style.display = 'none';
    spinner.style.display = 'block';
    btn.disabled = true;

    var p = {
      birth_datetime: document.getElementById('birth-date').value + 'T' + document.getElementById('birth-time').value + ':00',
      location: document.getElementById('location').value.trim(),
      zodiac_system: document.getElementById('zodiac').value,
      house_system: document.getElementById('house-system').value,
    };

    fetch('/chart', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p) })
      .then(function(r){
        if (!r.ok) return r.json().then(function(d){ throw new Error(d.detail || 'Failed'); });
        return r.json();
      })
      .then(function(d){
        spinner.style.display = 'none'; btn.disabled = false;
        LAST_DATA = d;
        buildMeta(d);
        buildInfoBox(d);
        results.classList.add('active');
        requestAnimationFrame(function(){ drawWheel(d); });
      })
      .catch(function(ex){
        spinner.style.display = 'none'; btn.disabled = false;
        errBar.textContent = ex.message || 'Network error';
        errBar.style.display = 'block';
        empty.style.display = 'flex';
      });
  });
})();
</script>
