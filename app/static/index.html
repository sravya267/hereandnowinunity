<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Chart - Natal Chart Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #f5f3f0;
    color: #3d3a36;
    font-size: 13px;
    line-height: 1.5;
  }

  .toolbar {
    display: flex;
    align-items: center;
    background: #fff;
    border-bottom: 1px solid #e8e4df;
    padding: 0 16px;
    height: 44px;
  }

  .brand {
    font-size: 15px;
    font-weight: 600;
    color: #5a4e3c;
    margin-right: 20px;
    white-space: nowrap;
  }
  .brand span { font-weight: 400; color: #a09788; }

  .toolbar form {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }

  .sep { width: 1px; height: 22px; background: #e8e4df; flex-shrink: 0; }

  .toolbar label {
    font-size: 11px;
    color: #9b9185;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .toolbar input,
  .toolbar select {
    padding: 4px 8px;
    border: 1px solid #ddd8d1;
    border-radius: 3px;
    background: #fcfbf9;
    color: #3d3a36;
    font-size: 12px;
    font-family: inherit;
  }

  .toolbar input:focus,
  .toolbar select:focus { outline: none; border-color: #b09e82; }

  .toolbar input[type="date"] { width: 140px; }
  .toolbar input[type="time"] { width: 110px; }
  .toolbar input[type="text"] { width: 160px; }
  .toolbar select { width: 90px; }

  .btn-calc {
    padding: 5px 16px;
    border: none;
    border-radius: 3px;
    background: #8b7355;
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-calc:hover { background: #7a644a; }
  .btn-calc:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-bar {
    background: #fdf2f2;
    border-bottom: 1px solid #e8c4c4;
    color: #9b4d4d;
    padding: 6px 16px;
    font-size: 12px;
    display: none;
  }

  .meta-bar {
    display: flex;
    gap: 18px;
    padding: 6px 16px;
    background: #faf8f5;
    border-bottom: 1px solid #e8e4df;
    flex-wrap: wrap;
  }
  .meta-item { font-size: 11px; color: #9b9185; }
  .meta-item b { color: #5a4e3c; font-weight: 500; }

  .page { padding: 12px 16px; display: none; }
  .page.active { display: block; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .card {
    background: #fff;
    border: 1px solid #e8e4df;
    border-radius: 5px;
    overflow: hidden;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #9b9185;
    padding: 8px 12px 4px;
    background: #faf8f5;
    border-bottom: 1px solid #e8e4df;
  }
  .card-title .n {
    background: #ece7df;
    padding: 0 6px;
    border-radius: 8px;
    font-size: 10px;
    margin-left: 4px;
    color: #8a8279;
  }

  .tbl-wrap {
    max-height: 280px;
    overflow-y: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11.5px;
    font-variant-numeric: tabular-nums;
  }

  th {
    text-align: left;
    padding: 5px 10px;
    background: #faf8f5;
    border-bottom: 1px solid #e8e4df;
    color: #8a8279;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  th:hover { color: #5a4e3c; }
  th.sorted-asc::after { content: ' \25B4'; }
  th.sorted-desc::after { content: ' \25BE'; }

  td {
    padding: 4px 10px;
    border-bottom: 1px solid #f0ece7;
    white-space: nowrap;
  }
  tr:nth-child(even) td { background: #fdfcfa; }
  tr:hover td { background: #f5f0ea; }
  td.num {
    text-align: right;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 10.5px;
    color: #6b6358;
  }

  .full-width { grid-column: 1 / -1; }

  .wheel-frame {
    width: 100%;
    height: 520px;
    border: none;
  }

  .wc-img { max-width: 100%; border-radius: 4px; }

  .empty-page {
    display: flex;
    align-items: center;
    justify-content: center;
    height: calc(100vh - 60px);
    color: #c4bdb4;
    font-size: 14px;
  }

  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: #9b9185;
  }
  .loading::before {
    content: '';
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid #e8e4df;
    border-top-color: #8b7355;
    border-radius: 50%;
    animation: sp 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes sp { to { transform: rotate(360deg); } }

  .note { color: #9b9185; font-size: 11px; margin-top: 6px; text-align: center; }

  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
    .toolbar { height: auto; padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
    .toolbar form { flex-wrap: wrap; }
    .sep { display: none; }
    .toolbar input[type="date"],
    .toolbar input[type="time"],
    .toolbar input[type="text"],
    .toolbar select { width: 100%; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="brand">Astro<span>Chart</span></div>
  <form id="chart-form">
    <label>Date</label>
    <input type="date" id="birth-date" required>
    <div class="sep"></div>
    <label>Time</label>
    <input type="time" id="birth-time" step="60" required>
    <div class="sep"></div>
    <label>Place</label>
    <input type="text" id="location" placeholder="City, Country" required>
    <div class="sep"></div>
    <label>System</label>
    <select id="zodiac">
      <option value="Tropical">Tropical</option>
      <option value="Sidereal">Sidereal</option>
    </select>
    <button type="submit" class="btn-calc" id="submit-btn">Calculate</button>
  </form>
</div>

<div id="error-bar" class="error-bar"></div>
<div class="loading" id="spinner">Calculating chart...</div>
<div id="empty-state" class="empty-page">Enter birth details above to generate your natal chart</div>

<div id="results" class="page">
  <div id="meta-bar" class="meta-bar"></div>

  <div style="padding:12px 16px;">
    <div class="grid">
      <!-- Planets -->
      <div class="card">
        <div class="card-title">Planetary Positions <span class="n" id="planet-n"></span></div>
        <div class="tbl-wrap"><table id="planet-tbl"></table></div>
      </div>

      <!-- Houses -->
      <div class="card">
        <div class="card-title">Houses &amp; Angles <span class="n" id="house-n"></span></div>
        <div class="tbl-wrap"><table id="house-tbl"></table></div>
      </div>

      <!-- Aspects -->
      <div class="card full-width">
        <div class="card-title">Aspects <span class="n" id="aspect-n"></span></div>
        <div class="tbl-wrap"><table id="aspect-tbl"></table></div>
      </div>

      <!-- Nakshatra (sidereal only) -->
      <div class="card full-width" id="nak-card" style="display:none;">
        <div class="card-title">Nakshatras <span class="n" id="nak-n"></span></div>
        <div class="tbl-wrap"><table id="nak-tbl"></table></div>
      </div>

      <!-- Chart Wheel -->
      <div class="card full-width">
        <div class="card-title">Chart Wheel</div>
        <div id="wheel-container" style="padding:4px;"></div>
      </div>

      <!-- Traits -->
      <div class="card full-width">
        <div class="card-title">Personality Traits</div>
        <div id="wordcloud-container" style="padding:8px; text-align:center;"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var form = document.getElementById('chart-form');
  var spinner = document.getElementById('spinner');
  var results = document.getElementById('results');
  var empty = document.getElementById('empty-state');
  var errBar = document.getElementById('error-bar');
  var btn = document.getElementById('submit-btn');

  function payload() {
    return {
      birth_datetime: document.getElementById('birth-date').value + 'T' + document.getElementById('birth-time').value + ':00',
      location: document.getElementById('location').value.trim(),
      zodiac_system: document.getElementById('zodiac').value,
    };
  }

  function err(m) { errBar.textContent = m; errBar.style.display = 'block'; }
  function clr() { errBar.style.display = 'none'; }

  function fmtDeg(d) {
    if (d == null) return '\u2014';
    var deg = Math.floor(d);
    var min = Math.floor((d - deg) * 60);
    return deg + '\u00b0' + (min < 10 ? '0' : '') + min + "'";
  }

  function meta(d) {
    var items = [
      ['Location', d.location],
      ['Timezone', d.moment.timezone],
      ['System', d.zodiac_system],
      ['Coords', d.moment.latitude.toFixed(4) + ', ' + d.moment.longitude.toFixed(4)],
    ];
    if (d.ayanamsa != null) {
      items.push(['Ayanamsa (Lahiri)', fmtDeg(d.ayanamsa)]);
    }
    document.getElementById('meta-bar').innerHTML = items.map(function (x) {
      return '<div class="meta-item">' + x[0] + ': <b>' + x[1] + '</b></div>';
    }).join('');
  }

  var ss = {};

  function buildTable(id, cols, rows, cid) {
    var t = document.getElementById(id);
    if (cid) document.getElementById(cid).textContent = rows ? rows.length : 0;
    if (!rows || !rows.length) {
      t.innerHTML = '<tbody><tr><td style="color:#c4bdb4;padding:12px">No data</td></tr></tbody>';
      return;
    }
    t.innerHTML = '<thead><tr>' + cols.map(function (c) {
      return '<th data-c="' + c.key + '">' + (c.label || c.key) + '</th>';
    }).join('') + '</tr></thead><tbody>' +
      rows.map(function (r) {
        return '<tr>' + cols.map(function (c) {
          var v = r[c.key];
          if (v == null) return '<td class="num">\u2014</td>';
          if (c.fmt === 'deg') return '<td class="num">' + fmtDeg(v) + '</td>';
          if (typeof v === 'number') return '<td class="num">' + (Number.isInteger(v) ? v : v.toFixed(2)) + '</td>';
          return '<td>' + v + '</td>';
        }).join('') + '</tr>';
      }).join('') + '</tbody>';

    t.querySelectorAll('th').forEach(function (h) {
      h.addEventListener('click', function () {
        var c = h.dataset.c, ky = id + c;
        var d = ss[ky] === 'asc' ? 'desc' : 'asc'; ss[ky] = d;
        var s = rows.slice().sort(function (a, b) {
          var x = a[c], y = b[c];
          if (x == null) return 1; if (y == null) return -1;
          if (typeof x === 'number') return d === 'asc' ? x - y : y - x;
          return d === 'asc' ? String(x).localeCompare(String(y)) : String(y).localeCompare(String(x));
        });
        buildTable(id, cols, s, cid);
        var nh = t.querySelector('th[data-c="' + c + '"]');
        if (nh) nh.classList.add(d === 'asc' ? 'sorted-asc' : 'sorted-desc');
      });
    });
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault(); clr();
    results.classList.remove('active'); empty.style.display = 'none';
    spinner.style.display = 'block'; btn.disabled = true;

    var p = payload(), h = { 'Content-Type': 'application/json' }, b = JSON.stringify(p);

    fetch('/chart', { method: 'POST', headers: h, body: b })
      .then(function (r) {
        if (!r.ok) return r.json().then(function (d) { throw new Error(d.detail || 'Failed'); });
        return r.json();
      })
      .then(function (d) {
        spinner.style.display = 'none'; btn.disabled = false;
        meta(d);

        var isSidereal = d.zodiac_system === 'Sidereal';
        var planets = d.bodies.filter(function (x) {
          return x.Body && x.Body.indexOf('House') === -1 &&
            x.Body !== 'Asc' && x.Body !== 'MC' && x.Body !== 'Desc' && x.Body !== 'IC';
        });
        var houses = d.bodies.filter(function (x) {
          return x.Body && (x.Body.indexOf('House') !== -1 ||
            x.Body === 'Asc' || x.Body === 'MC' || x.Body === 'Desc' || x.Body === 'IC');
        });

        var planetCols = [
          { key: 'Symbol', label: '' },
          { key: 'Body', label: 'Planet' },
          { key: 'Sign', label: 'Sign' },
          { key: 'Longitude (\u00b0)', label: 'Degree', fmt: 'deg' },
          { key: 'House', label: 'House' },
          { key: 'Motion', label: 'R/D' },
        ];

        var houseCols = [
          { key: 'Body', label: 'House' },
          { key: 'Sign', label: 'Sign' },
          { key: 'Longitude (\u00b0)', label: 'Degree', fmt: 'deg' },
        ];

        var aspectCols = [
          { key: 'Body A', label: 'Planet 1' },
          { key: 'aspect_symbol', label: '' },
          { key: 'Aspect', label: 'Aspect' },
          { key: 'Body B', label: 'Planet 2' },
          { key: 'Orb (°)', label: 'Orb', fmt: 'deg' },
        ];

        buildTable('planet-tbl', planetCols, planets, 'planet-n');
        buildTable('house-tbl', houseCols, houses, 'house-n');
        buildTable('aspect-tbl', aspectCols, d.aspects, 'aspect-n');

        var nakCard = document.getElementById('nak-card');
        if (isSidereal) {
          nakCard.style.display = '';
          var nakCols = [
            { key: 'Symbol', label: '' },
            { key: 'Body', label: 'Planet' },
            { key: 'Sign', label: 'Sign' },
            { key: 'Nakshatra', label: 'Nakshatra' },
            { key: 'Pada', label: 'Pada' },
            { key: 'Nak Lord', label: 'Lord' },
          ];
          buildTable('nak-tbl', nakCols, planets.filter(function (x) { return x.Nakshatra; }), 'nak-n');
        } else {
          nakCard.style.display = 'none';
        }

        results.classList.add('active');

        // Load wheel and wordcloud in background (non-blocking)
        fetch('/chart/wheel', { method: 'POST', headers: h, body: b })
          .then(function (r) { return r.ok ? r.text() : null; })
          .then(function (html) {
            var wc = document.getElementById('wheel-container');
            if (html) {
              var f = document.createElement('iframe');
              f.className = 'wheel-frame';
              f.setAttribute('sandbox', 'allow-scripts');
              wc.innerHTML = '';
              wc.appendChild(f);
              f.contentDocument.open();
              f.contentDocument.write(html);
              f.contentDocument.close();
            } else {
              wc.innerHTML = '<p class="note">Chart wheel unavailable</p>';
            }
          })
          .catch(function () {
            document.getElementById('wheel-container').innerHTML = '<p class="note">Chart wheel unavailable</p>';
          });

        fetch('/chart/wordcloud', { method: 'POST', headers: h, body: b })
          .then(function (r) { return r.ok ? r.blob() : null; })
          .then(function (bl) {
            var cc = document.getElementById('wordcloud-container');
            if (bl) {
              cc.innerHTML = '<img class="wc-img" src="' + URL.createObjectURL(bl) + '" alt="Traits">' +
                '<p class="note">Strengths and stress indicators based on planetary placements</p>';
            } else {
              cc.innerHTML = '<p class="note">Trait analysis unavailable</p>';
            }
          })
          .catch(function () {
            document.getElementById('wordcloud-container').innerHTML = '<p class="note">Trait analysis unavailable</p>';
          });
      })
      .catch(function (ex) {
        spinner.style.display = 'none'; btn.disabled = false;
        err(ex.message || 'Network error');
        empty.style.display = 'flex';
      });
  });
})();
</script>
</body>
</html>
