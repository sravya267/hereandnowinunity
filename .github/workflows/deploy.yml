name: Deploy to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push to Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/astro-chart/app:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/astro-chart/app:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy astro-chart \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/astro-chart/app:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Show service URL
        run: |
          gcloud run services describe astro-chart \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)'
