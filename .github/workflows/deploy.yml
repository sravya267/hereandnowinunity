name: Deploy to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/hereandnowinunity/astro-chart/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ephemeris data
        run: python scripts/download_ephemeris.py

      - name: Verify ephemeris files
        run: |
          echo "Ephemeris files:"
          ls -la ephe/
          test -f ephe/sepl_18.se1 || (echo "FATAL: sepl_18.se1 missing" && exit 1)
          test -f ephe/semo_18.se1 || (echo "FATAL: semo_18.se1 missing" && exit 1)
          test -f ephe/seas_18.se1 || (echo "FATAL: seas_18.se1 missing" && exit 1)

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy astro-chart \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --port 8080 \
            --memory 1Gi \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe astro-chart \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)'
